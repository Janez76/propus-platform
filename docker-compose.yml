services:
  # ─── Gemeinsame PostgreSQL-Instanz ──────────────────────────────────────────
  postgres:
    image: postgres:16
    ports:
      - "${PROPUS_PG_PORT:-5435}:5432"    # 5435 = frei auf VPS und lokal
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-propus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local}
      POSTGRES_DB: ${POSTGRES_DB:-propus}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propus -d propus"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - propus

  # ─── Logto PostgreSQL (eigene DB) ──────────────────────────────────────────
  logto-db:
    image: postgres:16
    ports:
      - "${LOGTO_PG_PORT:-5436}:5432"     # 5436 = frei auf VPS und lokal
    environment:
      POSTGRES_USER: logto
      POSTGRES_PASSWORD: logto_secret
      POSTGRES_DB: ${LOGTO_DB:-logto}
    volumes:
      - logto-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logto -d logto"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - propus

  # ─── Logto Auth Server ─────────────────────────────────────────────────────
  logto:
    image: svhd/logto:latest
    entrypoint: ["sh", "-c", "npm run cli db seed -- --swe && npm run cli db alteration deploy latest && npm start"]
    ports:
      - "${LOGTO_PORT:-3301}:3001"
      - "3002:3002"
      - "${LOGTO_ADMIN_PORT:-3302}:3002"
    environment:
      TRUST_PROXY_HEADER: "1"
      DB_URL: postgres://logto:logto_secret@logto-db:5432/logto
      ENDPOINT: http://localhost:3301
      ADMIN_ENDPOINT: http://localhost:3002
    depends_on:
      logto-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - propus

  # ─── Migration Runner ──────────────────────────────────────────────────────
  migrate:
    build:
      context: ./core
      dockerfile_inline: |
        FROM node:20-alpine
        WORKDIR /app
        COPY package*.json ./
        RUN npm ci --omit=dev
        COPY . .
        CMD ["node", "migrate.js"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-propus}:${POSTGRES_PASSWORD:-change_me_local}@postgres:5432/${POSTGRES_DB:-propus}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - propus
    profiles:
      - migrate

  # ─── Zentrale Propus-Plattform (Booking + Tour Manager, ein Prozess) ───────
  platform:
    build:
      context: .
      dockerfile: platform/Dockerfile
    ports:
      - "${BOOKING_PORT:-3100}:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-propus}:${POSTGRES_PASSWORD:-change_me_local}@postgres:5432/${POSTGRES_DB:-propus}
      DB_SEARCH_PATH: booking,tour_manager,core,public
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-propus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local}
      POSTGRES_DB: ${POSTGRES_DB:-propus}
      PORT: "3000"
      SESSION_SECRET: ${BOOKING_SESSION_SECRET:-booking-session-secret-change-me}
      TOURS_MOUNT_PATH: /tour-manager
      PROPUS_ENABLE_LEGACY_CUSTOMER_LOGIN: ${PROPUS_ENABLE_LEGACY_CUSTOMER_LOGIN:-0}
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT:-http://localhost:3301}
      LOGTO_INTERNAL_ENDPOINT: http://logto:3001
      PROPUS_BOOKING_LOGTO_APP_ID: ${PROPUS_BOOKING_LOGTO_APP_ID:-pwdmwn455oxoxdmaydjjo}
      PROPUS_BOOKING_LOGTO_APP_SECRET: ${PROPUS_BOOKING_LOGTO_APP_SECRET:-RFyRlrvEBohQxIg58jKk2eqywYuw7TJP}
      PROPUS_TOURS_ADMIN_LOGTO_APP_ID: ${PROPUS_TOURS_ADMIN_LOGTO_APP_ID:-ijxjuyq6ez1kvdans6goe}
      PROPUS_TOURS_ADMIN_LOGTO_APP_SECRET: ${PROPUS_TOURS_ADMIN_LOGTO_APP_SECRET:-EnvzjVAw2p4UBP8wNZAW6er3WSF0xLMf}
      PROPUS_TOURS_PORTAL_LOGTO_APP_ID: ${PROPUS_TOURS_PORTAL_LOGTO_APP_ID:-4de87xl1ecuwphccqzqaw}
      PROPUS_TOURS_PORTAL_LOGTO_APP_SECRET: ${PROPUS_TOURS_PORTAL_LOGTO_APP_SECRET:-R2uXLa7r3PLdb5q7Mmd8GJD65S5RR8cy}
      PROPUS_MANAGEMENT_LOGTO_APP_ID: ${PROPUS_MANAGEMENT_LOGTO_APP_ID:-xp7smk9yr99x9isgu9xi5}
      PROPUS_MANAGEMENT_LOGTO_APP_SECRET: ${PROPUS_MANAGEMENT_LOGTO_APP_SECRET:-AAucw4PSvK6uKUG2V1NFuXI0NonuLQyn}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-js@propus.ch}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Zuerich8038!}
      EXXAS_API_TOKEN: ${EXXAS_API_TOKEN:-}
      EXXAS_BASE_URL: ${EXXAS_BASE_URL:-https://api.exxas.net}
      MATTERPORT_TOKEN_ID: ${MATTERPORT_TOKEN_ID:-}
      MATTERPORT_TOKEN_SECRET: ${MATTERPORT_TOKEN_SECRET:-}
      NODE_ENV: development
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - propus

  # Legacy: getrennte Booking-/Tours-Container (Profil "legacy-services")
  booking:
    profiles:
      - legacy-services
    build:
      context: ./booking
      dockerfile: Dockerfile
    ports:
      - "${BOOKING_PORT:-3100}:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-propus}:${POSTGRES_PASSWORD:-change_me_local}@postgres:5432/${POSTGRES_DB:-propus}
      DB_SEARCH_PATH: booking,core,public
      PORT: "3000"
      SESSION_SECRET: ${BOOKING_SESSION_SECRET:-booking-session-secret-change-me}
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT:-http://localhost:3301}
      LOGTO_INTERNAL_ENDPOINT: http://logto:3001
      PROPUS_BOOKING_LOGTO_APP_ID: ${PROPUS_BOOKING_LOGTO_APP_ID:-pwdmwn455oxoxdmaydjjo}
      PROPUS_BOOKING_LOGTO_APP_SECRET: ${PROPUS_BOOKING_LOGTO_APP_SECRET:-RFyRlrvEBohQxIg58jKk2eqywYuw7TJP}
      NODE_ENV: development
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - propus

  tours:
    profiles:
      - legacy-services
    build:
      context: .
      dockerfile: ./tours/Dockerfile
    ports:
      - "${TOURS_PORT:-3200}:3000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-propus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local}
      POSTGRES_DB: ${POSTGRES_DB:-propus}
      DB_SEARCH_PATH: tour_manager,core,public
      PORT: "3000"
      SESSION_SECRET: ${TOURS_SESSION_SECRET:-tours-session-secret-change-me}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-js@propus.ch}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Zuerich8038!}
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT:-http://localhost:3301}
      LOGTO_INTERNAL_ENDPOINT: http://logto:3001
      PROPUS_TOURS_ADMIN_LOGTO_APP_ID: ${PROPUS_TOURS_ADMIN_LOGTO_APP_ID:-ijxjuyq6ez1kvdans6goe}
      PROPUS_TOURS_ADMIN_LOGTO_APP_SECRET: ${PROPUS_TOURS_ADMIN_LOGTO_APP_SECRET:-EnvzjVAw2p4UBP8wNZAW6er3WSF0xLMf}
      PROPUS_TOURS_PORTAL_LOGTO_APP_ID: ${PROPUS_TOURS_PORTAL_LOGTO_APP_ID:-4de87xl1ecuwphccqzqaw}
      PROPUS_TOURS_PORTAL_LOGTO_APP_SECRET: ${PROPUS_TOURS_PORTAL_LOGTO_APP_SECRET:-R2uXLa7r3PLdb5q7Mmd8GJD65S5RR8cy}
      EXXAS_API_TOKEN: ${EXXAS_API_TOKEN:-}
      EXXAS_BASE_URL: ${EXXAS_BASE_URL:-https://api.exxas.net}
      MATTERPORT_TOKEN_ID: ${MATTERPORT_TOKEN_ID:-}
      MATTERPORT_TOKEN_SECRET: ${MATTERPORT_TOKEN_SECRET:-}
      NODE_ENV: development
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - propus

volumes:
  postgres-data:
  logto-pgdata:

networks:
  propus:
    driver: bridge
