services:
  # ─── Gemeinsame PostgreSQL-Instanz ──────────────────────────────────────────
  postgres:
    image: postgres:16
    ports:
      - "${PROPUS_PG_PORT:-5435}:5432"    # 5435 = frei auf VPS und lokal
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-propus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local}
      POSTGRES_DB: ${POSTGRES_DB:-propus}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propus -d propus"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - propus

  # ─── Migration Runner ──────────────────────────────────────────────────────
  migrate:
    build:
      context: ./core
      dockerfile_inline: |
        FROM node:20.18.1-alpine
        WORKDIR /app
        COPY package*.json ./
        RUN npm ci --omit=dev
        COPY . .
        CMD ["node", "migrate.js"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-propus}:${POSTGRES_PASSWORD:-change_me_local}@postgres:5432/${POSTGRES_DB:-propus}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - propus
    profiles:
      - migrate

  # ─── Zentrale Propus-Plattform (Next.js + Express Backend) ──────────────────
  platform:
    build:
      context: .
      dockerfile: platform/Dockerfile
    ports:
      # Next.js auf 3001 (intern), Express auf 3100 (intern)
      # Externer Zugang via Reverse-Proxy (Nginx/Cloudflare)
      - "${NEXTJS_PORT:-3001}:3001"
      - "${BOOKING_PORT:-3100}:3100"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-propus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-propus}
      DB_SEARCH_PATH: booking,tour_manager,core,public
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-propus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-propus}
      PORT: "3100"
      NEXTJS_PORT: "3001"
      PLATFORM_INTERNAL_URL: "http://localhost:3100"
      SESSION_SECRET: ${BOOKING_SESSION_SECRET}
      TOURS_SESSION_SECRET: ${TOURS_SESSION_SECRET}
      TOURS_MOUNT_PATH: /tour-manager
      PROPUS_ENABLE_LEGACY_CUSTOMER_LOGIN: ${PROPUS_ENABLE_LEGACY_CUSTOMER_LOGIN:-0}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      EXXAS_API_TOKEN: ${EXXAS_API_TOKEN:-}
      EXXAS_BASE_URL: ${EXXAS_BASE_URL:-https://api.exxas.net}
      MATTERPORT_TOKEN_ID: ${MATTERPORT_TOKEN_ID:-}
      MATTERPORT_TOKEN_SECRET: ${MATTERPORT_TOKEN_SECRET:-}
      NODE_ENV: ${NODE_ENV:-production}
      LOG_FILE_ENABLED: "true"
      LOG_DIR: /app/logs
    env_file:
      - path: .env
        required: false
    volumes:
      - platform-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - propus
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/api/core/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Legacy: getrennte Booking-/Tours-Container (Profil "legacy-services")
  booking:
    profiles:
      - legacy-services
    build:
      context: .
      dockerfile: ./booking/Dockerfile
    ports:
      - "${BOOKING_PORT:-3100}:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-propus}:${POSTGRES_PASSWORD:-change_me_local}@postgres:5432/${POSTGRES_DB:-propus}
      DB_SEARCH_PATH: booking,core,public
      PORT: "3000"
      SESSION_SECRET: ${BOOKING_SESSION_SECRET:-booking-session-secret-change-me}
      NODE_ENV: development
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - propus

  tours:
    profiles:
      - legacy-services
    build:
      context: .
      dockerfile: ./tours/Dockerfile
    ports:
      - "${TOURS_PORT:-3200}:3000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-propus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local}
      POSTGRES_DB: ${POSTGRES_DB:-propus}
      DB_SEARCH_PATH: tour_manager,core,public
      PORT: "3000"
      SESSION_SECRET: ${TOURS_SESSION_SECRET:-tours-session-secret-change-me}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-js@propus.ch}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      EXXAS_API_TOKEN: ${EXXAS_API_TOKEN:-}
      EXXAS_BASE_URL: ${EXXAS_BASE_URL:-https://api.exxas.net}
      MATTERPORT_TOKEN_ID: ${MATTERPORT_TOKEN_ID:-}
      MATTERPORT_TOKEN_SECRET: ${MATTERPORT_TOKEN_SECRET:-}
      NODE_ENV: development
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - propus

volumes:
  postgres-data:
  platform-logs:

networks:
  propus:
    driver: bridge
