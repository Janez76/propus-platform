services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:${PROPUS_PG_PORT:-5435}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - propus

  migrate:
    build:
      context: ./core
      dockerfile_inline: |
        FROM node:20-alpine
        WORKDIR /app
        COPY package*.json ./
        RUN npm ci --omit=dev
        COPY . .
        CMD ["node", "migrate.js"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - propus
    profiles:
      - migrate

  platform:
    build:
      context: .
      dockerfile: platform/Dockerfile
      args:
        PLATFORM_INTERNAL_URL: http://127.0.0.1:3100
        NEXT_PUBLIC_PICDROP_URL: https://admin-booking.propus.ch/selekto/bilder-auswahl
    # .env.vps wird bei CI-Deploy überschrieben; .env.vps.secrets nur auf dem VPS,
    # niemals aus dem Archiv — letztere überschreibt gleiche Keys (z. B. Payrexx).
    env_file:
      - .env.vps
      - path: .env.vps.secrets
        required: false
    ports:
      - "127.0.0.1:${PLATFORM_PORT:-3100}:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DB_SEARCH_PATH: booking,tour_manager,core,public
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PORT: "3100"
      NEXTJS_PORT: "3001"
      NODE_ENV: production
      TIMEZONE: ${TIMEZONE:-Europe/Zurich}
      WORK_START: ${WORK_START:-08:00}
      WORK_END: ${WORK_END:-18:00}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: ${LOG_PRETTY:-false}
      LOG_REDACT: ${LOG_REDACT:-true}
      LOG_CONSOLE_ENABLED: ${LOG_CONSOLE_ENABLED:-false}
      LOG_FILE_ENABLED: ${LOG_FILE_ENABLED:-true}
      LOG_FILE_PATH: ${LOG_FILE_PATH:-/app/logs/platform.log}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-30}
      FRONTEND_LOG_RATE_LIMIT_PER_MIN: ${FRONTEND_LOG_RATE_LIMIT_PER_MIN:-120}
      SESSION_SECRET: ${BOOKING_SESSION_SECRET}
      BOOKING_SESSION_SECRET: ${BOOKING_SESSION_SECRET}
      TOURS_SESSION_SECRET: ${TOURS_SESSION_SECRET}
      SESSION_COOKIE_SECURE: "true"
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-}
      TOURS_MOUNT_PATH: /tour-manager
      PROPUS_ENABLE_LEGACY_CUSTOMER_LOGIN: ${PROPUS_ENABLE_LEGACY_CUSTOMER_LOGIN:-1}
      # ─── Admin-Hauptbenutzer (Bootstrap beim Start) ──────────────────────────
      ADMIN_USER: ${ADMIN_USER:-}
      ADMIN_PASS: ${ADMIN_PASS:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_NAME: ${ADMIN_NAME:-}
      ADMIN_ROLE: ${ADMIN_ROLE:-super_admin}
      # ─── Einmaliger Setup-Endpunkt (nach Setup auf "" setzen) ────────────────
      ADMIN_SETUP_TOKEN: ${ADMIN_SETUP_TOKEN:-}
      PLATFORM_INTERNAL_URL: http://127.0.0.1:3100
      MAIL_FROM: ${MAIL_FROM}
      OFFICE_EMAIL: ${OFFICE_EMAIL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      MS_GRAPH_TENANT_ID: ${MS_GRAPH_TENANT_ID:-}
      MS_GRAPH_CLIENT_ID: ${MS_GRAPH_CLIENT_ID:-}
      MS_GRAPH_CLIENT_SECRET: ${MS_GRAPH_CLIENT_SECRET:-}
      TENANT_ID: ${TENANT_ID:-}
      CLIENT_ID: ${CLIENT_ID:-}
      CLIENT_SECRET: ${CLIENT_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-https://booking.propus.ch}
      ADMIN_PANEL_URL: ${ADMIN_PANEL_URL:-https://admin-booking.propus.ch}
      BOOKING_UPLOAD_ROOT: /booking_upload_customer
      BOOKING_UPLOAD_CUSTOMER_ROOT: /booking_upload_customer
      BOOKING_UPLOAD_RAW_ROOT: /booking_upload_raw
      BOOKING_UPLOAD_STAGING_ROOT: /upload_staging
      BOOKING_UPLOAD_REQUIRE_MOUNT: ${BOOKING_UPLOAD_REQUIRE_MOUNT:-true}
      ORDERS_FILE: /data/state/orders.json
      BACKUP_ROOT: /data/backups
      BACKUP_SCRIPT_PATH: /app/scripts/backup-vps.sh
      BACKUP_RESTORE_TARGET: ${BACKUP_RESTORE_TARGET:-/opt/propus-platform}
      BACKUP_INCLUDE_VOLUMES: ${BACKUP_INCLUDE_VOLUMES:-0}
      BACKUP_VOLUME_PATHS: ${BACKUP_VOLUME_PATHS:-/data/state:/app/logs:/upload_staging}
      EXXAS_API_TOKEN: ${EXXAS_API_TOKEN:-}
      EXXAS_BASE_URL: ${EXXAS_BASE_URL:-https://api.exxas.net}
      MATTERPORT_TOKEN_ID: ${MATTERPORT_TOKEN_ID:-}
      MATTERPORT_TOKEN_SECRET: ${MATTERPORT_TOKEN_SECRET:-}
      # PAYREXX_* / PAYREXX_PAYMENT_METHODS nur über env_file (.env.vps + optional .env.vps.secrets)
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      GOOGLE_REVIEWS_PLACE_ID: ${GOOGLE_REVIEWS_PLACE_ID:-ChIJCXJ70_ZCiisRJDlGdaYk66Y}
      # ─── Nextcloud-Integration (UGREEN NAS via cloud.propus.ch) ──────────────
      NEXTCLOUD_URL: ${NEXTCLOUD_URL:-https://cloud.propus.ch}
      NEXTCLOUD_USER: ${NEXTCLOUD_USER:-}
      NEXTCLOUD_PASS: ${NEXTCLOUD_PASS:-}
      NEXTCLOUD_CUSTOMER_FOLDER_PATH: ${NEXTCLOUD_CUSTOMER_FOLDER_PATH:-/Immobilien Fotografie Propusimmo/Kunden}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3001/api/core/health',r=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>process.exit(r.statusCode===200&&d.includes('ok')?0:1));}).on('error',()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 8s
      retries: 30
      start_period: 180s
    volumes:
      - platform-state:/data/state
      - ./backups:/data/backups
      - platform-logs:/app/logs
      - ${BOOKING_UPLOAD_STAGING_HOST_PATH:-/opt/propus-upload-staging}:/upload_staging
      - ${BOOKING_UPLOAD_CUSTOMER_HOST_PATH:-/mnt/propus-nas-customers}:/booking_upload_customer
      - ${BOOKING_UPLOAD_RAW_HOST_PATH:-/mnt/propus-nas-raw}:/booking_upload_raw
    restart: unless-stopped
    networks:
      - propus

  website:
    build:
      context: ./website
      dockerfile: Dockerfile
      args:
        SUPABASE_URL: ${WEBSITE_SUPABASE_URL}
    ports:
      - "127.0.0.1:${WEBSITE_PORT:-4343}:4343"
    environment:
      NODE_ENV: production
      HOST: "0.0.0.0"
      PORT: "4343"
      SUPABASE_URL: ${WEBSITE_SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${WEBSITE_SUPABASE_SERVICE_ROLE_KEY}
      PROPUS_ADMIN_USER: ${WEBSITE_ADMIN_USER:-admin}
      PROPUS_ADMIN_PASSWORD: ${WEBSITE_ADMIN_PASSWORD}
      PROPUS_ADMIN_SECRET: ${WEBSITE_ADMIN_SECRET}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      GOOGLE_REVIEWS_PLACE_ID: ${GOOGLE_REVIEWS_PLACE_ID:-ChIJCXJ70_ZCiisRJDlGdaYk66Y}
      PUBLIC_SITE_LOGO_URL: ${PUBLIC_SITE_LOGO_URL:-}
      PUBLIC_SITE_FAVICON_URL: ${PUBLIC_SITE_FAVICON_URL:-}
      PUBLIC_BOOKING_CATALOG_URL: ${PUBLIC_BOOKING_CATALOG_URL:-}
      PUBLIC_SUPABASE_IMG_TRANSFORM: ${PUBLIC_SUPABASE_IMG_TRANSFORM:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4343/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - propus

volumes:
  postgres-data:
  platform-state:
  platform-logs:

networks:
  propus:
    driver: bridge
