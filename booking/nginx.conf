server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  charset utf-8;
  source_charset utf-8;

  # HSTS: nur wenn Request ueber HTTPS kam (z.B. Cloudflare)
  set $hsts "";
  if ($http_x_forwarded_proto = "https") {
    set $hsts "max-age=31536000; includeSubDomains; preload";
  }
  add_header Strict-Transport-Security $hsts always;

  # CSP: Einschraenkung gegen XSS (baseline)
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https: blob:; connect-src 'self' https://api-booking.propus.ch https://booking.propus.ch https://maps.googleapis.com; frame-ancestors 'self';" always;

  location /api/ {
    proxy_pass http://backend:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 10g;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  location /auth/ {
    proxy_pass http://backend:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # HTML-Dateien nie cachen (immer aktuelle Version)
  location ~* \.html$ {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }

  # Statische Assets lang cachen (haben Hash im Dateinamen)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
  }
}
