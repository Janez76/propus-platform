services:
  frontend:
    image: nginx:1.27-alpine
    user: "0:0"
    ports:
      - "8090:80"
    volumes:
      - /volume1/docker/Buchungstool:/usr/share/nginx/html:ro
      - /volume1/docker/Buchungstool/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: node:20.18.1-alpine
    working_dir: /app
    ports:
      - "3005:3001"
    volumes:
      - /volume1/docker/Buchungstool/backend:/app
      - backend_node_modules_prod:/app/node_modules
      - backend_orders:/data
      - /volume1/docker/Buchungstool-backups:/volume1/docker/Buchungstool-backups
      - /volume1/docker/Buchungstool/scripts:/volume1/docker/Buchungstool/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - "${BOOKING_UPLOAD_STAGING_HOST_PATH:-/volume1/docker/Buchungstool-upload-staging}:/upload_staging"
      - "${BOOKING_UPLOAD_CUSTOMER_HOST_PATH:-/volume1/PROPUS DRIVE/Immobilien Fotografie Propusimmo/Kunden}:/booking_upload_customer"
      - "${BOOKING_UPLOAD_RAW_HOST_PATH:-/volume1/PROPUS DRIVE/Bilder zum Zusammenstellen}:/booking_upload_raw"
    environment:
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - PORT=3001
      - BOOKING_UPLOAD_ROOT=/booking_upload_customer
      - BOOKING_UPLOAD_CUSTOMER_ROOT=/booking_upload_customer
      - BOOKING_UPLOAD_RAW_ROOT=/booking_upload_raw
      - BOOKING_UPLOAD_STAGING_ROOT=/upload_staging
      - BOOKING_UPLOAD_REQUIRE_MOUNT=${BOOKING_UPLOAD_REQUIRE_MOUNT:-true}
      - ORDERS_FILE=/data/orders.json
      - DATABASE_URL=postgresql://propus:${DB_PASS}@postgres:5432/buchungstool
      - ADMIN_USER=admin
      - ADMIN_PASS=${ADMIN_PASS}
      - MS_GRAPH_TENANT_ID=${MS_GRAPH_TENANT_ID}
      - MS_GRAPH_CLIENT_ID=${MS_GRAPH_CLIENT_ID}
      - MS_GRAPH_CLIENT_SECRET=${MS_GRAPH_CLIENT_SECRET}
      - TIMEZONE=${TIMEZONE:-Europe/Zurich}
      - WORK_START=${WORK_START:-08:00}
      - WORK_END=${WORK_END:-18:00}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_PRETTY=${LOG_PRETTY:-false}
      - LOG_REDACT=${LOG_REDACT:-true}
      - LOG_CONSOLE_ENABLED=${LOG_CONSOLE_ENABLED:-false}
      - LOG_FILE_ENABLED=${LOG_FILE_ENABLED:-true}
      - LOG_FILE_PATH=${LOG_FILE_PATH:-/app/logs/backend.log}
      - LOG_RETENTION_DAYS=${LOG_RETENTION_DAYS:-30}
      - FRONTEND_LOG_RATE_LIMIT_PER_MIN=${FRONTEND_LOG_RATE_LIMIT_PER_MIN:-120}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - MAIL_FROM=${MAIL_FROM:-office@propus.ch}
      - OFFICE_EMAIL=${OFFICE_EMAIL:-office@propus.ch}
      - FRONTEND_URL=${FRONTEND_URL:-https://booking.propus.ch}
      - ADMIN_PANEL_URL=${ADMIN_PANEL_URL:-https://admin-booking.propus.ch}
      - SESSION_SECRET=${SESSION_SECRET}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - SESSION_COOKIE_DOMAIN=${SESSION_COOKIE_DOMAIN:-}
      - EXXAS_API_URL=${EXXAS_API_URL:-}
      - EXXAS_API_KEY=${EXXAS_API_KEY:-}
      - EXXAS_WEBHOOK_SECRET=${EXXAS_WEBHOOK_SECRET:-}
      - TODO_SYNC_API_KEY=${TODO_SYNC_API_KEY:-}
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY:-}
      - BACKUP_ROOT=/volume1/docker/Buchungstool-backups
      - BACKUP_SCRIPT_PATH=/volume1/docker/Buchungstool/scripts/backup-container.sh
      - SRC_DIR=/volume1/docker/Buchungstool
      - BACKUP_RESTORE_TARGET=/volume1/docker
    depends_on:
      postgres:
        condition: service_healthy
    command: sh /app/docker-entrypoint-prod.sh
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3001/api/health',r=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>process.exit(r.statusCode===200&&d.includes('ok')?0:1));}).on('error',()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 8s
      retries: 36
      start_period: 180s

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=buchungstool
      - POSTGRES_USER=propus
      - POSTGRES_PASSWORD=${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propus -d buchungstool"]
      interval: 5s
      timeout: 5s
      retries: 10

  loki:
    image: grafana/loki:3.1.1
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3101:3100"
    volumes:
      - /volume1/docker/Buchungstool/monitoring/loki-config.yml:/etc/loki/loki-config.yml:ro
      - /volume1/docker/Buchungstool/monitoring/loki-rules.yml:/etc/loki/rules/buchungstool-rules.yml:ro
      - loki_data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.1.1
    command: -config.file=/etc/promtail/promtail-config.yml -config.expand-env=true
    environment:
      - PROMTAIL_ENV=nas
    volumes:
      - /volume1/docker/Buchungstool/monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /volume1/docker/Buchungstool/backend/logs:/var/log/buchungstool/backend:ro
      - promtail_positions:/tmp
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.5
    ports:
      - "3007:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_ALERTING_ENABLED=true
      - GF_UNIFIED_ALERTING_ENABLED=true
    volumes:
      - /volume1/docker/Buchungstool/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - /volume1/docker/Buchungstool/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  backend_node_modules_prod:
  backend_orders:
  postgres_data:
  loki_data:
  promtail_positions:
  grafana_data:
