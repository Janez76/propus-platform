# Admin-Static-Image: bei Deploy immer neu bauen wenn diese Datei geaendert wird.
# Docker Embedded DNS (127.0.0.11): Bei variablem proxy_pass wird backend bei jeder
# Anfrage neu aufgeloest – sonst bleibt alte Container-IP nach Backend-Neustart -> 502.

server {
  listen 80;
  server_name _;

  resolver 127.0.0.11 valid=10s ipv6=off;

  root /usr/share/nginx/html;
  index index.html;

  charset utf-8;
  source_charset utf-8;

  set $hsts "";
  set $forwarded_proto $scheme;
  if ($http_x_forwarded_proto = "https") {
    set $hsts "max-age=31536000; includeSubDomains; preload";
    set $forwarded_proto "https";
  }
  add_header Strict-Transport-Security $hsts always;

  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'self';" always;

  location /api/ {
    set $backend_url http://backend:3001;
    proxy_pass $backend_url$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    client_max_body_size 10g;
    proxy_connect_timeout 15s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  location /auth/ {
    set $backend_url http://backend:3001;
    proxy_pass $backend_url$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_connect_timeout 15s;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  location = /VERSION {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    expires -1;
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    expires -1;
  }

  # Alte URL (Zuweisung Explorer entfernt): harte Server-Weiterleitung, auch wenn noch alte index.html gecacht ist
  location = /settings/assignment-explorer {
    return 302 /settings/roles;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
