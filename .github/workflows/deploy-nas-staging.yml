# NAS-Staging-Deploy. Laeuft auf dem NAS-Self-Hosted-Runner.
# Keine SSH-Layer noetig: der Runner IST der NAS.
# Siehe docs/DEPLOY-FLOW.md fuer VPS-Prod-Flow (getrennter Workflow).

name: Deploy NAS Staging

on:
  push:
    branches:
      - "claude/**"
      - "cursor/**"
  workflow_dispatch:

concurrency:
  group: nas-staging-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to NAS
    runs-on: [self-hosted, nas-staging]
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Write NAS env file
        run: |
          # Secret NAS_ENV_FILE wird in Repo-Secrets hinterlegt und enthaelt
          # DB-Creds, API-Keys, PLATFORM_PORT etc. Mirror zu VPS_ENV_FILE.
          printf '%s\n' "${{ secrets.NAS_ENV_FILE }}" > .env.nas
          if [ ! -s .env.nas ]; then
            echo "::error::Secret NAS_ENV_FILE ist leer oder fehlt."
            exit 1
          fi

      - name: Docker compose build and up
        run: |
          # -p propus-staging isoliert die Staging-Container von anderen
          # Stacks auf dem NAS (vermeidet Namenskollisionen).
          docker compose \
            -p propus-staging \
            -f docker-compose.yml \
            --env-file .env.nas \
            up -d --build --remove-orphans

      - name: Wait for health
        id: health
        run: |
          # Port kommt aus .env.nas (PROPUS_PLATFORM_PORT), Default 3100.
          PORT="$(grep -E '^PROPUS_PLATFORM_PORT=' .env.nas | cut -d= -f2 | tr -d '\r\n' || true)"
          PORT="${PORT:-3100}"
          echo "port=$PORT" >> "$GITHUB_OUTPUT"
          for i in $(seq 1 24); do
            if curl -fsS "http://127.0.0.1:${PORT}/api/core/health" >/dev/null; then
              echo "Platform healthy on port ${PORT}"
              exit 0
            fi
            echo "Warte auf Platform (Versuch ${i}/24) ..."
            sleep 5
          done
          echo "::error::Health-Check fehlgeschlagen nach 120s."
          docker compose -p propus-staging logs --tail 200 || true
          exit 1

      - name: Report staging URL
        if: success()
        run: |
          echo "::notice::NAS-Staging deployed: http://192.168.1.5:${{ steps.health.outputs.port }}"
          echo "::notice::Branch: ${{ github.ref_name }} @ ${{ github.sha }}"

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "==> docker compose ps"
          docker compose -p propus-staging ps || true
          echo "==> docker compose logs (tail 300)"
          docker compose -p propus-staging logs --tail 300 || true
