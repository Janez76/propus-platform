# NAS-Staging manuell deployen (kein automatischer Push-Trigger).
# Start: GitHub → Actions → "Deploy NAS Staging" → Run workflow.
#
# Kein „git pull" auf dem NAS nötig: actions/checkout holt den Code (GITHUB_TOKEN).
# .env.staging kommt aus Secret NAS_ENV_FILE oder von der bestehenden Datei
# unter /volume1/docker/propus-staging/.env.staging auf dem NAS.
# Bei Fehler wird automatisch ein GitHub Issue erstellt (Label: staging-deploy).

name: Deploy NAS Staging

on:
  workflow_dispatch:

concurrency:
  group: deploy-nas-staging
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    name: Checkout + Docker Compose (NAS)
    runs-on: [self-hosted, nas-staging]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: .env.staging für Compose
        env:
          NAS_ENV_BODY: ${{ secrets.NAS_ENV_FILE }}
        run: |
          set -eu
          if [ -n "${NAS_ENV_BODY:-}" ]; then
            printf '%s\n' "$NAS_ENV_BODY" > .env.staging
            echo "[deploy-nas] .env.staging aus Secret NAS_ENV_FILE."
          else
            LEG="/volume1/docker/propus-staging/.env.staging"
            test -f "$LEG" || { echo "[deploy-nas] FEHLER: $LEG fehlt. Bitte Secret NAS_ENV_FILE setzen oder Datei anlegen."; exit 1; }
            cp -a "$LEG" .env.staging
            echo "[deploy-nas] .env.staging von $LEG kopiert."
          fi
          chmod 600 .env.staging

      - name: Docker Compose
        run: |
          set -eu
          docker compose -p propus-staging \
            -f docker-compose.vps.yml \
            -f docker-compose.staging.nas.yml \
            --env-file .env.staging \
            up -d --build

      - name: Health-Check
        run: |
          set -eu
          PORT="$(grep -E '^STAGING_PLATFORM_PORT=' .env.staging | tail -1 | cut -d= -f2- | tr -d '\r')"
          PORT="${PORT:-13100}"
          IP="${STAGING_HEALTH_HOST:-192.168.1.5}"
          URL="http://${IP}:${PORT}/api/core/health"
          echo "[deploy-nas] Warte auf ${URL} (max 90s)..."
          for i in $(seq 1 18); do
            if curl -fsS --max-time 5 "$URL"; then
              echo ""
              echo "[deploy-nas] Health-Check OK."
              exit 0
            fi
            echo "[deploy-nas] Versuch ${i}/18 fehlgeschlagen, warte 5s..."
            sleep 5
          done
          echo "[deploy-nas] Health-Check nach 90s nicht erfolgreich."
          exit 1

  report-failure:
    name: Issue bei Fehler erstellen
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Bestehendes offenes Issue suchen
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "staging-deploy" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          echo "number=${ISSUE_NUM}" >> "$GITHUB_OUTPUT"

      - name: Neues Issue erstellen (falls noch keines offen)
        if: steps.find.outputs.number == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "NAS Staging Deploy fehlgeschlagen (${{ github.sha }})" \
            --label "staging-deploy" \
            --body "## Deploy fehlgeschlagen

          **Workflow:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **Commit:** \`${{ github.sha }}\`
          **Ausgelöst von:** @${{ github.actor }}
          **Zeitpunkt:** $(date -u '+%Y-%m-%d %H:%M UTC')

          Bitte Workflow-Log prüfen und Issue schliessen, sobald behoben."

      - name: Kommentar zu bestehendem Issue hinzufügen
        if: steps.find.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ steps.find.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "Erneuter Fehler beim Deploy.

          **Workflow:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **Commit:** \`${{ github.sha }}\`
          **Zeitpunkt:** $(date -u '+%Y-%m-%d %H:%M UTC')"
