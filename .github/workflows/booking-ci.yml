name: Unit Tests + HTML lint (booking)

on:
  pull_request:
    branches:
      - master
    paths:
      - "booking/**"
      - ".github/workflows/booking-ci.yml"
  push:
    branches:
      - master
    paths:
      - "booking/**"
      - ".github/workflows/booking-ci.yml"

concurrency:
  group: booking-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Node test + htmlhint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: booking/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: booking

      - name: Unit tests
        run: npm test
        working-directory: booking

      - name: HTML lint (booking/*.html)
        run: npm run lint:html
        working-directory: booking
