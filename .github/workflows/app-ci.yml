name: Unit Tests (app)

on:
  pull_request:
    branches:
      - master
    paths:
      - "app/**"
      - ".github/workflows/app-ci.yml"
  push:
    branches:
      - master
    paths:
      - "app/**"
      - ".github/workflows/app-ci.yml"

concurrency:
  group: app-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Vitest (app)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Run unit tests
        run: npm test
        working-directory: app
