name: Deploy VPS And Booking Smoke

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      run_deploy:
        description: "VPS-Deploy ausfuehren"
        required: true
        default: true
        type: boolean
      run_smoke:
        description: "Playwright-Staging-Smoke-Test ausfuehren (bei Push auf master nie automatisch)"
        required: true
        default: true
        type: boolean

concurrency:
  group: deploy-vps-master
  cancel-in-progress: false

# Minimale Token-Rechte (Default-GITHUB_TOKEN).
permissions:
  contents: read

# Offizielle Actions auf Node-24-Runtime (keine Node-20-Deprecation-Warnung).
# Siehe https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name == 'push' || inputs.run_deploy }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Secret per env + bash: PowerShell-Here-Strings mit YAML-Einzug korruptieren PEM haeufig;
      # schliessendes "@ muss in PS zudem in Spalte 1 stehen.
      - name: Prepare SSH key
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" | tr -d '\r' > "$HOME/.ssh/id_ed25519_propus_vps"
          chmod 700 "$HOME/.ssh"
          chmod 600 "$HOME/.ssh/id_ed25519_propus_vps"
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Validate SSH key
        run: |
          set -euo pipefail
          if ! ssh-keygen -y -f "$HOME/.ssh/id_ed25519_propus_vps" >/dev/null 2>&1; then
            echo "VPS_SSH_PRIVATE_KEY ist ungueltig, falsch formatiert oder passwortgeschuetzt."
            echo "Bitte Secret mit der kompletten Private-Key-Datei (BEGIN/END, echte Zeilenumbrueche) ohne Passphrase hinterlegen."
            exit 1
          fi

      - name: Write .env.vps
        run: |
          set -euo pipefail
          if [ -n "${VPS_ENV_FILE:-}" ]; then
            printf '%s\n' "$VPS_ENV_FILE" > "$GITHUB_WORKSPACE/.env.vps"
          else
            echo "VPS_ENV_FILE ist leer; verwende ggf. vorhandene .env.vps im Deploy-Skript."
          fi
        env:
          VPS_ENV_FILE: ${{ secrets.VPS_ENV_FILE }}

      # deploy-vps.ps1: tar upload, migrate build+run, platform build+up, in-script /api/health wait (~90s).
      # Kein zweites "docker compose build platform" hier — das war redundant und verdoppelte die Build-Zeit.
      - name: Upload and restart stack
        shell: pwsh
        run: |
          $vpsKey = Join-Path $HOME '.ssh/id_ed25519_propus_vps'
          $deployScript = Join-Path $env:GITHUB_WORKSPACE 'scripts/deploy-vps.ps1'
          # Unter Linux schlaegt ./script.ps1 oft fehl (kein +x); & oder -File ist zuverlaessig.
          & $deployScript `
            -VpsHost 87.106.24.107 `
            -User root `
            -KeyPath $vpsKey `
            -SkipBackup `
            -SkipSwitch `
            -SkipCloudflarePurge

      - name: Health check
        shell: pwsh
        run: |
          $keyPath = Join-Path $HOME '.ssh/id_ed25519_propus_vps'
          ssh `
            -i "$keyPath" `
            -o IdentitiesOnly=yes `
            -o StrictHostKeyChecking=accept-new `
            -o ServerAliveInterval=30 `
            -o ServerAliveCountMax=12 `
            root@87.106.24.107 `
            "curl -fsS http://127.0.0.1:3100/api/health"

      - name: Purge Cloudflare cache
        shell: pwsh
        run: |
          if (-not $env:CLOUDFLARE_ZONE_ID -or -not $env:CLOUDFLARE_AUTH_EMAIL -or -not $env:CLOUDFLARE_AUTH_KEY) {
            Write-Host "Cloudflare-Secrets fehlen; Cache-Purge wird uebersprungen."
            exit 0
          }

          Invoke-RestMethod -Method Post `
            -Uri "https://api.cloudflare.com/client/v4/zones/$env:CLOUDFLARE_ZONE_ID/purge_cache" `
            -Headers @{
              "X-Auth-Email" = $env:CLOUDFLARE_AUTH_EMAIL
              "X-Auth-Key" = $env:CLOUDFLARE_AUTH_KEY
              "Content-Type" = "application/json"
            } `
            -Body '{"purge_everything":true}'
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_AUTH_EMAIL: ${{ secrets.CLOUDFLARE_AUTH_EMAIL }}
          CLOUDFLARE_AUTH_KEY: ${{ secrets.CLOUDFLARE_AUTH_KEY }}

  booking-smoke:
    name: Booking staging smoke
    runs-on: ubuntu-latest
    needs: deploy
    environment: production
    # Nur manuell (workflow_dispatch) wenn run_smoke aktiv; nicht bei jedem Push nach Deploy.
    if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.run_smoke && (needs.deploy.result == 'success' || needs.deploy.result == 'skipped') }}
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: platform/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: platform/frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: platform/frontend
        run: npx playwright install --with-deps chromium

      - name: Run staging smoke test
        working-directory: platform/frontend
        env:
          CI: "1"
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_LIVE_BOOKING: ${{ secrets.PLAYWRIGHT_LIVE_BOOKING }}
          PLAYWRIGHT_BOOKING_ADDRESS_QUERY: ${{ secrets.PLAYWRIGHT_BOOKING_ADDRESS_QUERY }}
          PLAYWRIGHT_BOOKING_PACKAGE_KEY: ${{ secrets.PLAYWRIGHT_BOOKING_PACKAGE_KEY }}
          PLAYWRIGHT_BOOKING_DATE: ${{ secrets.PLAYWRIGHT_BOOKING_DATE }}
          PLAYWRIGHT_BOOKING_SLOT: ${{ secrets.PLAYWRIGHT_BOOKING_SLOT }}
          PLAYWRIGHT_BOOKING_COMPANY: ${{ secrets.PLAYWRIGHT_BOOKING_COMPANY }}
          PLAYWRIGHT_BOOKING_NAME: ${{ secrets.PLAYWRIGHT_BOOKING_NAME }}
          PLAYWRIGHT_BOOKING_EMAIL: ${{ secrets.PLAYWRIGHT_BOOKING_EMAIL }}
          PLAYWRIGHT_BOOKING_PHONE: ${{ secrets.PLAYWRIGHT_BOOKING_PHONE }}
          PLAYWRIGHT_BOOKING_STREET: ${{ secrets.PLAYWRIGHT_BOOKING_STREET }}
          PLAYWRIGHT_BOOKING_ZIP: ${{ secrets.PLAYWRIGHT_BOOKING_ZIP }}
          PLAYWRIGHT_BOOKING_CITY: ${{ secrets.PLAYWRIGHT_BOOKING_CITY }}
          PLAYWRIGHT_BOOKING_OBJECT_TYPE: ${{ secrets.PLAYWRIGHT_BOOKING_OBJECT_TYPE }}
          PLAYWRIGHT_BOOKING_AREA: ${{ secrets.PLAYWRIGHT_BOOKING_AREA }}
          PLAYWRIGHT_BOOKING_ONSITE_NAME: ${{ secrets.PLAYWRIGHT_BOOKING_ONSITE_NAME }}
          PLAYWRIGHT_BOOKING_ONSITE_PHONE: ${{ secrets.PLAYWRIGHT_BOOKING_ONSITE_PHONE }}
        run: npm run test:e2e:staging

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-booking-staging-report
          path: |
            platform/frontend/playwright-report
            platform/frontend/test-results
          if-no-files-found: ignore
