name: Deploy VPS And Booking Smoke

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      run_deploy:
        description: "VPS-Deploy ausfuehren"
        required: true
        default: true
        type: boolean
      run_smoke:
        description: "Playwright-Staging-Smoke-Test ausfuehren (bei Push auf master nie automatisch)"
        required: true
        default: true
        type: boolean

concurrency:
  group: deploy-vps-master
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ─── Architecture Guard: Kein neues EJS ────────────────────────────────────
  architecture-guard:
    name: Architecture Guard (No EJS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run EJS architecture guard
        run: bash scripts/guard-no-ejs.sh

  # ─── Build Next.js (Type-Check + Build) ────────────────────────────────────
  build-nextjs:
    name: Build Next.js App
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_smoke }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Build Next.js (type-check + build)
        run: npm run build
        working-directory: app
        env:
          NODE_ENV: production
          NEXT_PUBLIC_PUBLIC_BOOKING_HOSTNAME: booking.propus.ch
          NEXT_PUBLIC_BASE_URL: /

  # ─── Deploy to VPS ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: architecture-guard
    environment: production
    if: ${{ github.event_name == 'push' || inputs.run_deploy }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 50

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519_propus_vps
          chmod 600 ~/.ssh/id_ed25519_propus_vps
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Bump version + Changelog
        id: bump
        run: |
          set -e
          RAW=$(cat booking/public/VERSION)
          # Parse vX.Y.Z
          MAJOR=$(echo "$RAW" | sed 's/v\([0-9]*\)\..*/\1/')
          MINOR=$(echo "$RAW" | sed 's/v[0-9]*\.\([0-9]*\)\..*/\1/')
          PATCH=$(echo "$RAW" | sed 's/v[0-9]*\.[0-9]*\.\([0-9]*\)/\1/')
          NEW_PATCH=$((PATCH + 1))
          NEW_VER="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "new_version=$NEW_VER" >> "$GITHUB_OUTPUT"
          echo "Bumping $RAW -> $NEW_VER"

          # Alle VERSION-Dateien aktualisieren
          echo -n "$NEW_VER" > booking/public/VERSION
          echo -n "$NEW_VER" > booking/admin-panel/public/VERSION
          echo -n "$NEW_VER" > app/public/VERSION
          echo -n "$NEW_VER" > website/public/VERSION

          # website/package.json version aktualisieren
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('website/package.json','utf8'));
            p.version = '${MAJOR}.${MINOR}.${NEW_PATCH}';
            fs.writeFileSync('website/package.json', JSON.stringify(p, null, 2) + '\n');
          "

          # Changelog automatisch aus Commits generieren
          node scripts/update-changelog.js --version "$NEW_VER" --date "$(date +%Y-%m-%d)"

          # Commit & Push (Version + Changelog in einem Commit)
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            booking/public/VERSION \
            booking/admin-panel/public/VERSION \
            app/public/VERSION \
            website/public/VERSION \
            website/package.json \
            app/src/data/changelogData.ts \
            booking/admin-panel/src/data/changelogData.ts
          git commit -m "chore: Deploy $NEW_VER [skip ci]"
          git push origin master

      - name: Create deploy archive
        run: |
          tar \
            --exclude-vcs \
            --exclude='.github' \
            --exclude='docs' \
            --exclude='backups' \
            -czf "/tmp/propus-platform-${GITHUB_SHA}.tar.gz" .

      - name: Write VPS env file
        run: |
          printf '%s\n' "${{ secrets.VPS_ENV_FILE }}" > /tmp/propus-platform.env.vps

      - name: Upload deploy archive
        run: |
          scp -i ~/.ssh/id_ed25519_propus_vps "/tmp/propus-platform-${GITHUB_SHA}.tar.gz" \
            root@${{ secrets.VPS_HOST }}:"/tmp/propus-platform-${GITHUB_SHA}.tar.gz"

      - name: Upload VPS env file
        run: |
          scp -i ~/.ssh/id_ed25519_propus_vps /tmp/propus-platform.env.vps \
            root@${{ secrets.VPS_HOST }}:/opt/propus-platform/.env.vps

      # ── Rollback-Snapshot vor dem Deploy sichern ───────────────────────────
      - name: Save rollback snapshot
        run: |
          ssh -i ~/.ssh/id_ed25519_propus_vps root@${{ secrets.VPS_HOST }} bash << 'ENDSSH'
            set -e
            PROJECT_ROOT=/opt/propus-platform
            ROLLBACK_DIR=/opt/propus-platform-rollback
            mkdir -p "$ROLLBACK_DIR"

            # Aktuell laufende Version als Rollback-Archiv sichern (nur wenn vorhanden)
            if [ -d "$PROJECT_ROOT" ] && [ "$(ls -A "$PROJECT_ROOT" 2>/dev/null)" ]; then
              echo "==> Sichere aktuellen Stand fuer moeglichen Rollback..."
              tar -czf "${ROLLBACK_DIR}/last-good.tar.gz" -C "$PROJECT_ROOT" . 2>/dev/null || true
              if [ -f "${PROJECT_ROOT}/.env.vps" ]; then
                cp "${PROJECT_ROOT}/.env.vps" "${ROLLBACK_DIR}/last-good.env.vps"
              fi
              echo "Rollback-Snapshot gespeichert: ${ROLLBACK_DIR}/last-good.tar.gz"
            else
              echo "Kein bestehender Stand gefunden – kein Rollback-Snapshot."
            fi
          ENDSSH

      # ── Deploy-Script auf VPS hochladen ───────────────────────────────────
      - name: Upload deploy scripts
        run: |
          scp -i ~/.ssh/id_ed25519_propus_vps \
            scripts/deploy-remote.sh \
            scripts/rollback-vps.sh \
            root@${{ secrets.VPS_HOST }}:/tmp/propus-deploy-scripts/
          ssh -i ~/.ssh/id_ed25519_propus_vps root@${{ secrets.VPS_HOST }} \
            "chmod +x /tmp/propus-deploy-scripts/*.sh && mkdir -p /opt/propus-platform/scripts && cp /tmp/propus-deploy-scripts/rollback-vps.sh /opt/propus-platform/scripts/rollback-vps.sh || true"

      # ── Deploy (mit automatischem Retry bei Fehler) ────────────────────────
      - name: Deploy to VPS
        id: deploy_step
        continue-on-error: true
        run: |
          run_deploy() {
            ssh -i ~/.ssh/id_ed25519_propus_vps \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=12 \
              root@${{ secrets.VPS_HOST }} \
              "GITHUB_SHA='${GITHUB_SHA}' bash /tmp/propus-deploy-scripts/deploy-remote.sh"
          }

          echo "==> Deploy Versuch 1/2..."
          if run_deploy; then
            echo "deploy_result=success" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::warning::Versuch 1 fehlgeschlagen. Warte 30s, dann Versuch 2..."
          sleep 30

          echo "==> Deploy Versuch 2/2 (Retry)..."
          if run_deploy; then
            echo "deploy_result=success" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy nach Retry erfolgreich."
            exit 0
          fi

          echo "deploy_result=failed" >> "$GITHUB_OUTPUT"
          echo "::error::Deploy nach 2 Versuchen fehlgeschlagen."
          exit 1

      # ── Automatischer Rollback wenn Deploy fehlschlaegt ────────────────────
      - name: Automatic rollback on deploy failure
        if: steps.deploy_step.outcome == 'failure'
        run: |
          echo "::error::Deploy fehlgeschlagen – starte automatischen Rollback..."
          ssh -i ~/.ssh/id_ed25519_propus_vps \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=6 \
            root@${{ secrets.VPS_HOST }} \
            "bash /tmp/propus-deploy-scripts/rollback-vps.sh || bash /opt/propus-platform/scripts/rollback-vps.sh"
          echo "::warning::Rollback abgeschlossen. Produktionssystem laeuft auf letzter stabiler Version."

      - name: Fail after rollback
        if: steps.deploy_step.outcome == 'failure'
        run: |
          echo "::error::Deploy fehlgeschlagen (Rollback wurde ausgefuehrt). Bitte Fehler beheben und erneut pushen."
          exit 1

      - name: Container status check
        run: |
          ssh -i ~/.ssh/id_ed25519_propus_vps root@${{ secrets.VPS_HOST }} bash << 'ENDSSH'
            set -e
            PROJECT_ROOT=/opt/propus-platform
            cd "$PROJECT_ROOT"

            echo "==> docker compose ps"
            docker compose -f docker-compose.vps.yml --env-file .env.vps ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "==> Container-Status-Pruefung"
            FAILED=0

            check_container() {
              local name="$1"
              local status
              status=$(docker inspect --format='{{.State.Status}}' "$name" 2>/dev/null || echo "missing")
              if [ "$status" = "running" ]; then
                echo "  OK       $name ($status)"
              else
                echo "  FEHLER   $name ($status)"
                FAILED=$((FAILED + 1))
              fi
            }

            for ctn in \
              propus-platform-postgres-1 \
              propus-platform-logto-db-1 \
              propus-platform-logto-1 \
              propus-platform-platform-1 \
              propus-platform-website-1; do
              check_container "$ctn"
            done

            if [ "$FAILED" -gt 0 ]; then
              echo ""
              echo "FEHLER: $FAILED Container laufen nicht!"
              echo ""
              echo "==> Letzte Logs der fehlerhaften Container:"
              for ctn in \
                propus-platform-postgres-1 \
                propus-platform-logto-db-1 \
                propus-platform-logto-1 \
                propus-platform-platform-1 \
                propus-platform-website-1; do
                status=$(docker inspect --format='{{.State.Status}}' "$ctn" 2>/dev/null || echo "missing")
                if [ "$status" != "running" ]; then
                  echo "--- Logs: $ctn ---"
                  docker logs --tail 50 "$ctn" 2>&1 || true
                fi
              done
              exit 1
            fi

            echo ""
            echo "Alle Container laufen korrekt."
          ENDSSH

      - name: Purge Cloudflare cache
        if: success()
        env:
          CF_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_EMAIL: ${{ secrets.CLOUDFLARE_AUTH_EMAIL }}
          CF_KEY: ${{ secrets.CLOUDFLARE_AUTH_KEY }}
        run: |
          set -e
          if [ -z "${CF_ZONE:-}" ] || [ -z "${CF_EMAIL:-}" ] || [ -z "${CF_KEY:-}" ]; then
            echo "::warning::Cloudflare-Secrets fehlen — Cache-Purge uebersprungen."
            exit 0
          fi
          echo "==> Cloudflare purge_everything"
          body=$(curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE}/purge_cache" \
            -H "X-Auth-Email: ${CF_EMAIL}" \
            -H "X-Auth-Key: ${CF_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}')
          echo "$body"
          echo "$body" | jq -e '.success == true' >/dev/null

      - name: Verify deployed version
        run: |
          EXPECTED_VERSION="${{ steps.bump.outputs.new_version }}"
          echo "Expected version: $EXPECTED_VERSION"
          HEALTH=$(ssh -i ~/.ssh/id_ed25519_propus_vps root@${{ secrets.VPS_HOST }} \
            "curl -sf http://127.0.0.1:3100/api/core/health")
          echo "Health response: $HEALTH"
          DEPLOYED=$(echo "$HEALTH" | python3 -c "import sys,json; print(json.load(sys.stdin).get('buildId','UNKNOWN'))")
          echo "Deployed version: $DEPLOYED"
          if [ "$DEPLOYED" = "$EXPECTED_VERSION" ]; then
            echo "Version check passed: $DEPLOYED"
          else
            echo "Version check FAILED: expected=$EXPECTED_VERSION deployed=$DEPLOYED"
            exit 1
          fi

      - name: Notify deploy status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice::Deploy erfolgreich: ${{ steps.bump.outputs.new_version }}"
          else
            echo "::error::Deploy fehlgeschlagen fuer Version ${{ steps.bump.outputs.new_version }}"
          fi

  # ─── Smoke Tests ────────────────────────────────────────────────────────────
  smoke:
    name: Booking Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_smoke }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium
        working-directory: app

      - name: Run smoke tests
        run: npx playwright test e2e/
        working-directory: app
        env:
          BASE_URL: ${{ secrets.STAGING_URL || 'https://admin.propus.ch' }}
