name: Deploy VPS And Booking Smoke

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      run_deploy:
        description: "VPS-Deploy ausfuehren"
        required: true
        default: true
        type: boolean
      run_smoke:
        description: "Playwright-Staging-Smoke-Test ausfuehren (bei Push auf master nie automatisch)"
        required: true
        default: true
        type: boolean

concurrency:
  group: deploy-vps-master
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Build Next.js (Type-Check + Build) ────────────────────────────────────
  build-nextjs:
    name: Build Next.js App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Build Next.js (type-check + build)
        run: npm run build
        working-directory: app
        env:
          NODE_ENV: production
          NEXT_PUBLIC_PUBLIC_BOOKING_HOSTNAME: booking.propus.ch
          NEXT_PUBLIC_BASE_URL: /

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            app/.next/standalone
            app/.next/static
            app/public
          retention-days: 1

  # ─── Deploy to VPS ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    needs: build-nextjs
    if: ${{ github.event_name == 'push' || inputs.run_deploy }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Next.js build
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: app-build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519_propus_vps
          chmod 600 ~/.ssh/id_ed25519_propus_vps
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/id_ed25519_propus_vps root@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd /opt/propus-platform
            
            echo "==> Git Pull"
            git pull origin master
            
            echo "==> Docker Build & Restart"
            docker compose build --no-cache platform
            docker compose up -d --force-recreate platform
            
            echo "==> DB Migrations"
            docker compose --profile migrate run --rm migrate
            
            echo "==> Health Check"
            sleep 10
            curl -sf http://localhost:3001/api/core/health || (echo "Health check failed" && exit 1)
            
            echo "==> Deploy complete"
          ENDSSH

      - name: Notify deploy status
        if: always()
        run: |
          STATUS=${{ job.status == 'success' && 'SUCCESS' || 'FAILED' }}
          echo "Deploy status: $STATUS"

  # ─── Smoke Tests ────────────────────────────────────────────────────────────
  smoke:
    name: Booking Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_smoke }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium
        working-directory: app

      - name: Run smoke tests
        run: npx playwright test e2e/
        working-directory: app
        env:
          BASE_URL: ${{ secrets.STAGING_URL || 'https://admin.propus.ch' }}
