name: Deploy VPS And Booking Smoke

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      run_deploy:
        description: "VPS-Deploy ausfuehren"
        required: true
        default: true
        type: boolean
      run_smoke:
        description: "Playwright-Staging-Smoke-Test ausfuehren (bei Push auf master nie automatisch)"
        required: true
        default: true
        type: boolean

concurrency:
  group: deploy-vps-master
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ─── Architecture Guard: Kein neues EJS ────────────────────────────────────
  architecture-guard:
    name: Architecture Guard (No EJS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run EJS architecture guard
        run: bash scripts/guard-no-ejs.sh

  # ─── Build Next.js (Type-Check + Build) ────────────────────────────────────
  build-nextjs:
    name: Build Next.js App
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_smoke }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Build Next.js (type-check + build)
        run: npm run build
        working-directory: app
        env:
          NODE_ENV: production
          NEXT_PUBLIC_PUBLIC_BOOKING_HOSTNAME: booking.propus.ch
          NEXT_PUBLIC_BASE_URL: /

  # ─── Deploy to VPS ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: architecture-guard
    environment: production
    if: ${{ github.event_name == 'push' || inputs.run_deploy }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519_propus_vps
          chmod 600 ~/.ssh/id_ed25519_propus_vps
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Bump version
        id: bump
        run: |
          set -e
          RAW=$(cat booking/public/VERSION)
          # Parse vX.Y.Z
          MAJOR=$(echo "$RAW" | sed 's/v\([0-9]*\)\..*/\1/')
          MINOR=$(echo "$RAW" | sed 's/v[0-9]*\.\([0-9]*\)\..*/\1/')
          PATCH=$(echo "$RAW" | sed 's/v[0-9]*\.[0-9]*\.\([0-9]*\)/\1/')
          NEW_PATCH=$((PATCH + 1))
          NEW_VER="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "new_version=$NEW_VER" >> "$GITHUB_OUTPUT"
          echo "Bumping $RAW -> $NEW_VER"
          # Alle VERSION-Dateien aktualisieren
          echo -n "$NEW_VER" > booking/public/VERSION
          echo -n "$NEW_VER" > booking/admin-panel/public/VERSION
          echo -n "$NEW_VER" > app/public/VERSION
          echo -n "$NEW_VER" > website/public/VERSION
          # website/package.json version aktualisieren
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('website/package.json','utf8'));
            p.version = '${MAJOR}.${MINOR}.${NEW_PATCH}';
            fs.writeFileSync('website/package.json', JSON.stringify(p, null, 2) + '\n');
          "
          # Commit & Push
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add booking/public/VERSION booking/admin-panel/public/VERSION app/public/VERSION website/public/VERSION website/package.json
          git commit -m "chore(version): Deploy-Version auf $NEW_VER erhoehen [skip ci]"
          git push origin master

      - name: Create deploy archive
        run: |
          tar \
            --exclude-vcs \
            --exclude='.github' \
            --exclude='docs' \
            --exclude='backups' \
            -czf "/tmp/propus-platform-${GITHUB_SHA}.tar.gz" .

      - name: Write VPS env file
        run: |
          printf '%s\n' "${{ secrets.VPS_ENV_FILE }}" > /tmp/propus-platform.env.vps

      - name: Upload deploy archive
        run: |
          scp -i ~/.ssh/id_ed25519_propus_vps "/tmp/propus-platform-${GITHUB_SHA}.tar.gz" \
            root@${{ secrets.VPS_HOST }}:"/tmp/propus-platform-${GITHUB_SHA}.tar.gz"

      - name: Upload VPS env file
        run: |
          scp -i ~/.ssh/id_ed25519_propus_vps /tmp/propus-platform.env.vps \
            root@${{ secrets.VPS_HOST }}:/opt/propus-platform/.env.vps

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/id_ed25519_propus_vps root@${{ secrets.VPS_HOST }} "GITHUB_SHA='${GITHUB_SHA}' bash -se" << 'ENDSSH'
            set -e
            PROJECT_ROOT=/opt/propus-platform
            ARCHIVE_PATH=/tmp/propus-platform-${GITHUB_SHA}.tar.gz
            STAGING_DIR=/tmp/propus-platform-${GITHUB_SHA}

            mkdir -p "$PROJECT_ROOT"
            rm -rf "$STAGING_DIR"
            mkdir -p "$STAGING_DIR"

            echo "==> Extract deploy archive"
            tar -xzf "$ARCHIVE_PATH" -C "$STAGING_DIR"
            tar -C "$STAGING_DIR" -cf - . | tar -C "$PROJECT_ROOT" -xf -
            rm -rf "$STAGING_DIR" "$ARCHIVE_PATH"

            cd "$PROJECT_ROOT"

            echo "==> Docker Build"
            docker compose -f docker-compose.vps.yml --env-file .env.vps build migrate platform website

            echo "==> Platform Restart"
            docker compose -f docker-compose.vps.yml --env-file .env.vps up -d --force-recreate platform

            echo "==> DB Migrations"
            docker compose -f docker-compose.vps.yml --env-file .env.vps --profile migrate run --rm migrate

            echo "==> Website Handover"
            docker compose -f docker-compose.vps.yml --env-file .env.vps rm -sf website || true
            if command -v fuser >/dev/null 2>&1; then
              fuser -k 4343/tcp || true
            else
              pids=$(ss -ltnp '( sport = :4343 )' 2>/dev/null | awk -F 'pid=' 'NR>1 && NF>1 {split($2,a,","); print a[1]}' | sort -u)
              if [ -n "$pids" ]; then
                kill $pids || true
              fi
            fi
            docker compose -f docker-compose.vps.yml --env-file .env.vps up -d --force-recreate website

            echo "==> Health Check"
            for attempt in $(seq 1 30); do
              if curl -sf http://127.0.0.1:3100/api/core/health >/dev/null; then
                echo "Health check passed on attempt $attempt"
                break
              fi
              if [ "$attempt" -eq 30 ]; then
                echo "Health check failed after 30 attempts"
                exit 1
              fi
              sleep 2
            done

            echo "==> Website Health Check"
            for attempt in $(seq 1 30); do
              if curl -sf http://127.0.0.1:4343/ >/dev/null; then
                echo "Website health check passed on attempt $attempt"
                break
              fi
              if [ "$attempt" -eq 30 ]; then
                echo "Website health check failed after 30 attempts"
                exit 1
              fi
              sleep 2
            done

            echo "==> Deploy complete"
          ENDSSH

      - name: Purge Cloudflare cache
        if: success()
        env:
          CF_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_EMAIL: ${{ secrets.CLOUDFLARE_AUTH_EMAIL }}
          CF_KEY: ${{ secrets.CLOUDFLARE_AUTH_KEY }}
        run: |
          set -e
          if [ -z "${CF_ZONE:-}" ] || [ -z "${CF_EMAIL:-}" ] || [ -z "${CF_KEY:-}" ]; then
            echo "::warning::Cloudflare-Secrets (CLOUDFLARE_ZONE_ID / CLOUDFLARE_AUTH_EMAIL / CLOUDFLARE_AUTH_KEY) fehlen — Cache-Purge uebersprungen."
            exit 0
          fi
          echo "==> Cloudflare purge_everything"
          body=$(curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE}/purge_cache" \
            -H "X-Auth-Email: ${CF_EMAIL}" \
            -H "X-Auth-Key: ${CF_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}')
          echo "$body"
          echo "$body" | jq -e '.success == true' >/dev/null

      - name: Verify deployed version
        run: |
          EXPECTED_VERSION="${{ steps.bump.outputs.new_version }}"
          echo "Expected version: $EXPECTED_VERSION"
          HEALTH=$(ssh -i ~/.ssh/id_ed25519_propus_vps root@${{ secrets.VPS_HOST }} \
            "curl -sf http://127.0.0.1:3100/api/core/health")
          echo "Health response: $HEALTH"
          DEPLOYED=$(echo "$HEALTH" | python3 -c "import sys,json; print(json.load(sys.stdin).get('buildId','UNKNOWN'))")
          echo "Deployed version: $DEPLOYED"
          if [ "$DEPLOYED" = "$EXPECTED_VERSION" ]; then
            echo "Version check passed: $DEPLOYED"
          else
            echo "Version check FAILED: expected=$EXPECTED_VERSION deployed=$DEPLOYED"
            exit 1
          fi

      - name: Notify deploy status
        if: always()
        run: |
          STATUS=${{ job.status == 'success' && 'SUCCESS' || 'FAILED' }}
          echo "Deploy status: $STATUS"

  # ─── Smoke Tests ────────────────────────────────────────────────────────────
  smoke:
    name: Booking Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_smoke }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium
        working-directory: app

      - name: Run smoke tests
        run: npx playwright test e2e/
        working-directory: app
        env:
          BASE_URL: ${{ secrets.STAGING_URL || 'https://admin.propus.ch' }}
