name: Deploy VPS And Booking Smoke

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      run_deploy:
        description: "VPS-Deploy ausfuehren"
        required: true
        default: true
        type: boolean
      run_smoke:
        description: "Playwright-Staging-Smoke-Test ausfuehren (bei Push auf master nie automatisch)"
        required: true
        default: true
        type: boolean

concurrency:
  group: deploy-vps-master
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  # ─── Architecture Guard: Kein neues EJS ────────────────────────────────────
  architecture-guard:
    name: Architecture Guard (No EJS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 50
      - name: Run EJS architecture guard
        run: bash scripts/guard-no-ejs.sh

  # ─── Documentation Guard: docs/ mitgepflegt? ───────────────────────────────
  documentation-guard:
    name: Documentation Guard (docs/ aktuell?)
    runs-on: ubuntu-latest
    # Läuft parallel zum Architecture Guard, blockiert NICHT den Deploy
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 50
      - name: Run documentation guard
        run: bash scripts/guard-docs.sh --ci

  # ─── Build Next.js (Type-Check + Build) ────────────────────────────────────
  build-nextjs:
    name: Build Next.js App
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_smoke }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Build Next.js (type-check + build)
        run: npm run build
        working-directory: app
        env:
          NODE_ENV: production
          NEXT_PUBLIC_PUBLIC_BOOKING_HOSTNAME: booking.propus.ch
          NEXT_PUBLIC_BASE_URL: /

  # ─── Deploy to VPS ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: architecture-guard
    environment: production
    if: ${{ github.event_name == 'push' || inputs.run_deploy }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 50

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519_propus_vps
          chmod 600 ~/.ssh/id_ed25519_propus_vps
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare deploy version
        id: bump
        run: |
          set -e
          RAW=$(tr -d '\r\n' < booking/public/VERSION)
          BASE_VER="${RAW#v}"
          SHORT_SHA=$(printf '%s' "${GITHUB_SHA}" | cut -c1-7)
          DEPLOY_SUFFIX="deploy.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}.${SHORT_SHA}"
          NEW_VER="v${BASE_VER}-${DEPLOY_SUFFIX}"
          WEBSITE_VER="${BASE_VER}-${DEPLOY_SUFFIX}"
          echo "new_version=$NEW_VER" >> "$GITHUB_OUTPUT"
          echo "Preparing ephemeral deploy version $RAW -> $NEW_VER"

          # Alle VERSION-Dateien nur fuer dieses Deploy aktualisieren.
          # Der Workflow schreibt bewusst nicht mehr nach master zurueck.
          echo -n "$NEW_VER" > booking/public/VERSION
          echo -n "$NEW_VER" > booking/admin-panel/public/VERSION
          echo -n "$NEW_VER" > app/public/VERSION
          echo -n "$NEW_VER" > website/public/VERSION

          # website/package.json version fuer den Build aktualisieren
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('website/package.json','utf8'));
            p.version = '${WEBSITE_VER}';
            fs.writeFileSync('website/package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Build Booking Admin Panel
        working-directory: booking/admin-panel
        env:
          VITE_PICDROP_URL: https://bildauswahl.propus.ch/bilder-auswahl
        run: |
          npm ci
          npm run build

      - name: Create deploy archive
        run: |
          tar \
            --exclude-vcs \
            --exclude='.github' \
            --exclude='docs' \
            --exclude='backups' \
            -czf "/tmp/propus-platform-${GITHUB_SHA}.tar.gz" .

      - name: Write VPS env file
        run: |
          printf '%s\n' "${{ secrets.VPS_ENV_FILE }}" > /tmp/propus-platform.env.vps

      - name: Download current VPS env file
        run: |
          rm -f /tmp/propus-platform.current.env.vps
          if ssh -i ~/.ssh/id_ed25519_propus_vps root@${{ secrets.VPS_HOST }} "test -f /opt/propus-platform/.env.vps"; then
            scp -i ~/.ssh/id_ed25519_propus_vps \
              root@${{ secrets.VPS_HOST }}:/opt/propus-platform/.env.vps \
              /tmp/propus-platform.current.env.vps
          fi

      - name: Merge Payrexx keys from live env (when secret incomplete)
        run: node scripts/merge-vps-env-protected.js /tmp/propus-platform.env.vps /tmp/propus-platform.current.env.vps

      - name: Guard Payrexx env overwrite
        run: |
          bash scripts/guard-vps-env.sh \
            /tmp/propus-platform.current.env.vps \
            /tmp/propus-platform.env.vps

      # Deploy-Archiv: Upload nur im Schritt „Deploy to VPS“ (upload_archive vor jedem Versuch inkl. Retry)

      - name: Upload VPS env file
        run: |
          scp -i ~/.ssh/id_ed25519_propus_vps /tmp/propus-platform.env.vps \
            root@${{ secrets.VPS_HOST }}:/opt/propus-platform/.env.vps

      # ── Rollback-Snapshot vor dem Deploy sichern ───────────────────────────
      - name: Save rollback snapshot
        run: |
          ssh -i ~/.ssh/id_ed25519_propus_vps root@${{ secrets.VPS_HOST }} bash << 'ENDSSH'
            set -e
            PROJECT_ROOT=/opt/propus-platform
            ROLLBACK_DIR=/opt/propus-platform-rollback
            mkdir -p "$ROLLBACK_DIR"

            # Aktuell laufende Version als Rollback-Archiv sichern (nur wenn vorhanden)
            if [ -d "$PROJECT_ROOT" ] && [ "$(ls -A "$PROJECT_ROOT" 2>/dev/null)" ]; then
              echo "==> Sichere aktuellen Stand fuer moeglichen Rollback..."
              tar -czf "${ROLLBACK_DIR}/last-good.tar.gz" -C "$PROJECT_ROOT" . 2>/dev/null || true
              if [ -f "${PROJECT_ROOT}/.env.vps" ]; then
                cp "${PROJECT_ROOT}/.env.vps" "${ROLLBACK_DIR}/last-good.env.vps"
              fi
              if [ -f "${PROJECT_ROOT}/.env.vps.secrets" ]; then
                cp "${PROJECT_ROOT}/.env.vps.secrets" "${ROLLBACK_DIR}/last-good.env.vps.secrets"
              fi
              echo "Rollback-Snapshot gespeichert: ${ROLLBACK_DIR}/last-good.tar.gz"
            else
              echo "Kein bestehender Stand gefunden – kein Rollback-Snapshot."
            fi
          ENDSSH

      # ── Deploy-Script auf VPS hochladen ───────────────────────────────────
      - name: Upload deploy scripts
        run: |
          scp -i ~/.ssh/id_ed25519_propus_vps \
            scripts/deploy-remote.sh \
            scripts/rollback-vps.sh \
            scripts/vps-bootstrap-env-secrets.sh \
            root@${{ secrets.VPS_HOST }}:/tmp/propus-deploy-scripts/
          ssh -i ~/.ssh/id_ed25519_propus_vps root@${{ secrets.VPS_HOST }} \
            "chmod +x /tmp/propus-deploy-scripts/*.sh && mkdir -p /opt/propus-platform/scripts && cp /tmp/propus-deploy-scripts/rollback-vps.sh /tmp/propus-deploy-scripts/vps-bootstrap-env-secrets.sh /opt/propus-platform/scripts/ && chmod +x /opt/propus-platform/scripts/vps-bootstrap-env-secrets.sh || true"

      # ── Deploy (mit automatischem Retry bei Fehler) ────────────────────────
      - name: Deploy to VPS
        id: deploy_step
        continue-on-error: true
        run: |
          DEPLOY_LOG="${RUNNER_TEMP}/deploy-vps.log"
          : > "$DEPLOY_LOG"

          upload_archive() {
            scp -i ~/.ssh/id_ed25519_propus_vps "/tmp/propus-platform-${GITHUB_SHA}.tar.gz" \
              root@${{ secrets.VPS_HOST }}:"/tmp/propus-platform-${GITHUB_SHA}.tar.gz" \
              2>&1 | tee -a "$DEPLOY_LOG"
            return ${PIPESTATUS[0]}
          }

          run_deploy() {
            ssh -i ~/.ssh/id_ed25519_propus_vps \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=12 \
              root@${{ secrets.VPS_HOST }} \
              "GITHUB_SHA='${GITHUB_SHA}' bash /tmp/propus-deploy-scripts/deploy-remote.sh" \
              2>&1 | tee -a "$DEPLOY_LOG"
            return ${PIPESTATUS[0]}
          }

          echo "==> Deploy Versuch 1/2..." | tee -a "$DEPLOY_LOG"
          echo "==> Deploy-Archiv erneut hochladen (Versuch 1/2)..." | tee -a "$DEPLOY_LOG"
          upload_archive
          if run_deploy; then
            echo "deploy_result=success" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::warning::Versuch 1 fehlgeschlagen. Warte 30s, dann Versuch 2..." | tee -a "$DEPLOY_LOG"
          sleep 30

          echo "==> Deploy Versuch 2/2 (Retry)..." | tee -a "$DEPLOY_LOG"
          echo "==> Deploy-Archiv erneut hochladen (Versuch 2/2)..." | tee -a "$DEPLOY_LOG"
          upload_archive
          if run_deploy; then
            echo "deploy_result=success" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy nach Retry erfolgreich." | tee -a "$DEPLOY_LOG"
            exit 0
          fi

          echo "deploy_result=failed" >> "$GITHUB_OUTPUT"
          echo "::error::Deploy nach 2 Versuchen fehlgeschlagen." | tee -a "$DEPLOY_LOG"
          exit 1

      # ── Automatischer Rollback wenn Deploy fehlschlaegt ────────────────────
      - name: Automatic rollback on deploy failure
        if: steps.deploy_step.outcome == 'failure'
        run: |
          ROLLBACK_LOG="${RUNNER_TEMP}/rollback-vps.log"
          : > "$ROLLBACK_LOG"
          echo "::error::Deploy fehlgeschlagen – starte automatischen Rollback..." | tee -a "$ROLLBACK_LOG"
          ssh -i ~/.ssh/id_ed25519_propus_vps \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=6 \
            root@${{ secrets.VPS_HOST }} \
            "bash /tmp/propus-deploy-scripts/rollback-vps.sh || bash /opt/propus-platform/scripts/rollback-vps.sh" \
            2>&1 | tee -a "$ROLLBACK_LOG"
          echo "::warning::Rollback abgeschlossen. Produktionssystem laeuft auf letzter stabiler Version." | tee -a "$ROLLBACK_LOG"

      - name: Fail after rollback
        if: steps.deploy_step.outcome == 'failure'
        run: |
          echo "::error::Deploy fehlgeschlagen (Rollback wurde ausgefuehrt). Bitte Fehler beheben und erneut pushen."
          exit 1

      - name: Container status check
        run: |
          CONTAINER_LOG="${RUNNER_TEMP}/container-status.log"
          : > "$CONTAINER_LOG"
          ssh -i ~/.ssh/id_ed25519_propus_vps root@${{ secrets.VPS_HOST }} bash << 'ENDSSH' 2>&1 | tee -a "$CONTAINER_LOG"
            set -e
            PROJECT_ROOT=/opt/propus-platform
            cd "$PROJECT_ROOT"

            echo "==> docker compose ps"
            docker compose -f docker-compose.vps.yml --env-file .env.vps ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "==> Container-Status-Pruefung"
            FAILED=0

            check_container() {
              local name="$1"
              local status
              status=$(docker inspect --format='{{.State.Status}}' "$name" 2>/dev/null || echo "missing")
              if [ "$status" = "running" ]; then
                echo "  OK       $name ($status)"
              else
                echo "  FEHLER   $name ($status)"
                FAILED=$((FAILED + 1))
              fi
            }

            for ctn in \
              propus-platform-postgres-1 \
              propus-platform-platform-1 \
              propus-platform-website-1; do
              check_container "$ctn"
            done

            if [ "$FAILED" -gt 0 ]; then
              echo ""
              echo "FEHLER: $FAILED Container laufen nicht!"
              echo ""
              echo "==> Letzte Logs der fehlerhaften Container:"
              for ctn in \
                propus-platform-postgres-1 \
                propus-platform-platform-1 \
                propus-platform-website-1; do
                status=$(docker inspect --format='{{.State.Status}}' "$ctn" 2>/dev/null || echo "missing")
                if [ "$status" != "running" ]; then
                  echo "--- Logs: $ctn ---"
                  docker logs --tail 50 "$ctn" 2>&1 || true
                fi
              done
              exit 1
            fi

            echo ""
            echo "Alle Container laufen korrekt."
          ENDSSH
          exit ${PIPESTATUS[0]}

      # ── Admin-Benutzer Bootstrap nach Deploy ────────────────────────────────
      - name: Bootstrap admin user (janez)
        continue-on-error: true
        env:
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_NAME: ${{ secrets.ADMIN_NAME }}
          ADMIN_ROLE: ${{ secrets.ADMIN_ROLE }}
        run: |
          if [ -z "${ADMIN_PASS:-}" ] || [ "${#ADMIN_PASS}" -lt 8 ]; then
            echo "::notice::ADMIN_PASS nicht gesetzt oder zu kurz – Admin-Bootstrap übersprungen."
            echo "Setze GitHub Secrets: ADMIN_USER, ADMIN_PASS, ADMIN_EMAIL, ADMIN_NAME, ADMIN_ROLE"
            exit 0
          fi
          echo "==> Bootstrap Admin-Benutzer: ${ADMIN_EMAIL:-${ADMIN_USER}}"
          ssh -i ~/.ssh/id_ed25519_propus_vps root@${{ secrets.VPS_HOST }} \
            "docker exec \
              -e ADMIN_USER='${ADMIN_USER}' \
              -e ADMIN_PASS='${ADMIN_PASS}' \
              -e ADMIN_EMAIL='${ADMIN_EMAIL}' \
              -e ADMIN_NAME='${ADMIN_NAME}' \
              -e ADMIN_ROLE='${ADMIN_ROLE:-super_admin}' \
              propus-platform-platform-1 \
              node -e \"
                const db = require('./booking/db');
                db.bootstrapAdminUserFromEnvIfMissing()
                  .then(r => { console.log('[admin-bootstrap]', JSON.stringify(r)); process.exit(0); })
                  .catch(e => { console.error('[admin-bootstrap] Fehler:', e.message); process.exit(1); });
              \""
          echo "::notice::Admin-Bootstrap abgeschlossen."

      - name: Purge Cloudflare cache
        if: success()
        env:
          CF_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_EMAIL: ${{ secrets.CLOUDFLARE_AUTH_EMAIL }}
          CF_KEY: ${{ secrets.CLOUDFLARE_AUTH_KEY }}
        run: |
          set -e
          if [ -z "${CF_ZONE:-}" ] || [ -z "${CF_EMAIL:-}" ] || [ -z "${CF_KEY:-}" ]; then
            echo "::warning::Cloudflare-Secrets fehlen — Cache-Purge uebersprungen."
            exit 0
          fi
          echo "==> Cloudflare purge_everything"
          body=$(curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE}/purge_cache" \
            -H "X-Auth-Email: ${CF_EMAIL}" \
            -H "X-Auth-Key: ${CF_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}')
          echo "$body"
          echo "$body" | jq -e '.success == true' >/dev/null

      - name: Verify deployed version
        run: |
          EXPECTED_VERSION="${{ steps.bump.outputs.new_version }}"
          echo "Expected version: $EXPECTED_VERSION"
          VERIFY_OK=0
          DEPLOYED="UNKNOWN"
          LAST_HTTP="000"
          LAST_BODY=""
          for attempt in 1 2 3 4 5; do
            echo "Version check attempt ${attempt}/5 ..."
            RESPONSE=$(ssh -i ~/.ssh/id_ed25519_propus_vps root@${{ secrets.VPS_HOST }} \
              "curl -sS -w '__HTTP_STATUS__:%{http_code}' http://127.0.0.1:3100/api/core/health" || true)
            LAST_HTTP="${RESPONSE##*__HTTP_STATUS__:}"
            LAST_BODY="${RESPONSE%__HTTP_STATUS__:*}"
            echo "Health HTTP status: $LAST_HTTP"
            echo "Health response: $LAST_BODY"
            if [ "$LAST_HTTP" = "200" ]; then
              DEPLOYED=$(printf '%s' "$LAST_BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('buildId','UNKNOWN'))" 2>/dev/null || echo "UNKNOWN")
              echo "Deployed version: $DEPLOYED"
              if [ "$DEPLOYED" = "$EXPECTED_VERSION" ]; then
                VERIFY_OK=1
                break
              fi
            fi
            sleep 5
          done

          if [ "$VERIFY_OK" = "1" ]; then
            echo "Version check passed: $DEPLOYED"
          else
            echo "Version check FAILED: expected=$EXPECTED_VERSION deployed=$DEPLOYED http=$LAST_HTTP"
            exit 1
          fi

      - name: Verify public routes
        run: |
          set -euo pipefail

          check_url() {
            local name="$1"
            local url="$2"
            local expect="$3"
            local tmp_body
            tmp_body="$(mktemp)"
            local tmp_headers
            tmp_headers="$(mktemp)"
            local status="000"
            local ok=0

            for attempt in 1 2 3 4 5; do
              status=$(curl -sS -L \
                -D "$tmp_headers" \
                -o "$tmp_body" \
                -w "%{http_code}" \
                "$url" || echo "000")

              case "$expect" in
                html)
                  if [ "$status" = "200" ] && grep -qi '^content-type: text/html' "$tmp_headers"; then
                    ok=1
                  fi
                  ;;
                json_health)
                  if [ "$status" = "200" ] && grep -q '"ok"[[:space:]]*:[[:space:]]*true' "$tmp_body"; then
                    ok=1
                  fi
                  ;;
              esac

              if [ "$ok" = "1" ]; then
                echo "OK: $name ($status)"
                rm -f "$tmp_body" "$tmp_headers"
                return 0
              fi

              echo "Warte auf $name (Versuch ${attempt}/5, HTTP $status) ..."
              sleep 5
            done

            echo "FEHLER: $name nicht erreichbar oder falsche Antwort (HTTP $status)"
            echo "--- Header ---"
            cat "$tmp_headers" || true
            echo "--- Body ---"
            head -n 40 "$tmp_body" || true
            rm -f "$tmp_body" "$tmp_headers"
            return 1
          }

          check_url "booking.propus.ch" "https://booking.propus.ch/" html
          check_url "admin-booking.propus.ch" "https://admin-booking.propus.ch/" html
          check_url "api-booking.propus.ch health" "https://api-booking.propus.ch/api/core/health" json_health
          check_url "api.propus.ch health" "https://api.propus.ch/api/core/health" json_health

      - name: Notify deploy status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${NEW_VERSION}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          COMMIT_URL="https://github.com/${REPO}/commit/${COMMIT_SHA}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" "${COMMIT_SHA}" 2>/dev/null || echo "unbekannt")
          SHORT_SHA="${COMMIT_SHA:0:7}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          append_log_block() {
            local title="$1"
            local file="$2"
            local target="$3"
            if [ -f "$file" ] && [ -s "$file" ]; then
              {
                echo ""
                echo "### ${title}"
                echo ""
                echo '```text'
                tail -n 60 "$file" | perl -pe 's/\e\[[0-9;]*[A-Za-z]//g' | tr -d '\r'
                echo '```'
              } >> "$target"
            fi
          }

          gh label create "deploy-failure" --color "d73a4a" \
            --description "Automatisch bei fehlgeschlagenem Deploy erstellt" 2>/dev/null || true

          if [ "$JOB_STATUS" = "success" ]; then
            echo "::notice::Deploy erfolgreich: ${VERSION}"
            OPEN_ISSUES=$(gh issue list --label "deploy-failure" --state open --limit 10 \
              --json number --jq '.[].number' 2>/dev/null || true)
            for issue_num in $OPEN_ISSUES; do
              gh issue close "$issue_num" \
                --comment "Deploy ${VERSION} war erfolgreich. Issue automatisch geschlossen. ${RUN_URL}" \
                2>/dev/null || true
              echo "::notice::Issue #${issue_num} geschlossen"
            done
          else
            echo "::error::Deploy fehlgeschlagen: ${VERSION}"
            EXISTING=$(gh issue list --label "deploy-failure" --state open --limit 1 \
              --json number --jq '.[0].number' 2>/dev/null || true)
            if [ -n "$EXISTING" ]; then
              printf '%s\n' \
                "## Erneuter Deploy-Fehler" \
                "" \
                "- Version: \`${VERSION}\`" \
                "- Commit: [\`${SHORT_SHA}\`](${COMMIT_URL})" \
                "- Nachricht: ${COMMIT_MSG}" \
                "- Branch: \`${REF_NAME}\`" \
                "- Workflow: [Run #${RUN_ID}](${RUN_URL})" \
                "- Zeitpunkt: ${TIMESTAMP}" \
                > deploy-failure-comment.md
              append_log_block "Deploy-Log (letzte 60 Zeilen)" "${RUNNER_TEMP}/deploy-vps.log" deploy-failure-comment.md
              append_log_block "Rollback-Log (letzte 60 Zeilen)" "${RUNNER_TEMP}/rollback-vps.log" deploy-failure-comment.md
              append_log_block "Container-Status-Log (letzte 60 Zeilen)" "${RUNNER_TEMP}/container-status.log" deploy-failure-comment.md
              gh issue comment "$EXISTING" \
                --body-file deploy-failure-comment.md \
                2>/dev/null || true
              echo "::notice::Kommentar zu Issue #${EXISTING} hinzugefuegt"
            else
              printf '%s\n' \
                "## Deploy fehlgeschlagen" \
                "" \
                "- Version: \`${VERSION}\`" \
                "- Commit: [\`${SHORT_SHA}\`](${COMMIT_URL})" \
                "- Nachricht: ${COMMIT_MSG}" \
                "- Branch: \`${REF_NAME}\`" \
                "- Workflow: [Run #${RUN_ID}](${RUN_URL})" \
                "- Zeitpunkt: ${TIMESTAMP}" \
                "" \
                "### Naechste Schritte" \
                "" \
                "1. [Workflow-Logs oeffnen](${RUN_URL})" \
                "2. Fehler beheben und erneut pushen" \
                "3. Das Issue wird beim naechsten erfolgreichen Deploy automatisch geschlossen" \
                > deploy-failure-issue.md
              append_log_block "Deploy-Log (letzte 60 Zeilen)" "${RUNNER_TEMP}/deploy-vps.log" deploy-failure-issue.md
              append_log_block "Rollback-Log (letzte 60 Zeilen)" "${RUNNER_TEMP}/rollback-vps.log" deploy-failure-issue.md
              append_log_block "Container-Status-Log (letzte 60 Zeilen)" "${RUNNER_TEMP}/container-status.log" deploy-failure-issue.md
              gh issue create \
                --title "Deploy fehlgeschlagen: ${VERSION}" \
                --label "deploy-failure" \
                --body-file deploy-failure-issue.md \
                2>/dev/null || true
              echo "::notice::Issue erstellt fuer ${VERSION}"
            fi
          fi

  # ─── Smoke Tests ────────────────────────────────────────────────────────────
  smoke:
    name: Booking Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_smoke }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium
        working-directory: app

      - name: Run smoke tests
        run: npx playwright test e2e/
        working-directory: app
        env:
          BASE_URL: ${{ secrets.STAGING_URL || 'https://admin.propus.ch' }}
