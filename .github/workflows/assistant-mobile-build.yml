name: Assistant Mobile APK Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile (preview = APK, production = AAB)"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production
  push:
    branches:
      - master
    paths:
      - "apps/propus-assistant-mobile/**"
      - ".github/workflows/assistant-mobile-build.yml"

jobs:
  build:
    name: EAS Build (Android)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/propus-assistant-mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Verify EAS projectId is configured
        run: |
          if ! node -e "process.exit(require('./app.json').expo?.extra?.eas?.projectId ? 0 : 1)"; then
            echo "::error::Kein EAS projectId in app.json. Bitte einmalig lokal 'eas init' ausführen und das aktualisierte app.json committen, bevor CI-Builds laufen."
            exit 1
          fi

      - name: Build APK / AAB on EAS
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          eas build --non-interactive --platform android --profile "$PROFILE" --no-wait
