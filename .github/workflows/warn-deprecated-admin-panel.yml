name: Warn on deprecated admin-panel changes

# ──────────────────────────────────────────────────────────────────────────────
# Dieser Workflow prueft bei jedem Pull Request, ob Dateien unter
# booking/admin-panel/**/*.{ts,tsx,js,jsx} geaendert wurden.
#
# Wenn ja, wird ein Hinweis-Kommentar am PR hinterlassen. Der Job **blockiert
# nicht** (exit 0), damit legitime Bugfixes fuer den Altcode weiterhin moeglich
# sind. Siehe booking/admin-panel/DEPRECATED.md fuer Hintergrund.
# ──────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "booking/admin-panel/**/*.ts"
      - "booking/admin-panel/**/*.tsx"
      - "booking/admin-panel/**/*.js"
      - "booking/admin-panel/**/*.jsx"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: warn-deprecated-admin-panel-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  warn:
    name: Hinweis auf deprecated-Ast
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Geaenderte Dateien sammeln
        id: changed
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | grep -E '^booking/admin-panel/.*\.(ts|tsx|js|jsx)$' || true)
          {
            echo "files<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Geaenderte Dateien im deprecated-Ast:"
          echo "$FILES"

      - name: PR kommentieren
        if: steps.changed.outputs.files != ''
        uses: actions/github-script@v7
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        with:
          script: |
            const files = (process.env.CHANGED_FILES || "")
              .split("\n")
              .map(s => s.trim())
              .filter(Boolean);
            const list = files.map(f => `- \`${f}\``).join("\n");
            const body = [
              "⚠️ Commit beruehrt deprecated-Ast `booking/admin-panel/`. Siehe DEPRECATED.md.",
              "",
              "Neue Features gehoeren nach `app/src/` (Next.js).",
              "Bugfixes fuer Altcode sind zulaessig — dieser Kommentar ist kein Block.",
              "",
              "**Geaenderte Dateien:**",
              list,
              "",
              "Details: [`booking/admin-panel/DEPRECATED.md`](../blob/" +
                context.payload.pull_request.head.ref +
                "/booking/admin-panel/DEPRECATED.md)",
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
