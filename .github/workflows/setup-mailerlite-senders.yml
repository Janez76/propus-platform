name: Setup MailerLite Sender Domains

on:
  workflow_dispatch:
    inputs:
      mailerlite_token:
        description: 'MailerLite API Token (aus .env oder MailerLite Dashboard)'
        required: true
        type: string

jobs:
  setup-senders:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check domain_auth status
        id: check_auth
        run: |
          RESPONSE=$(curl -s \
            "https://connect.mailerlite.com/api/account" \
            -H "Authorization: Bearer ${{ inputs.mailerlite_token }}" \
            -H "Accept: application/json")
          
          DOMAIN_AUTH=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['domain_auth'])" 2>/dev/null || echo "False")
          echo "domain_auth: $DOMAIN_AUTH"
          echo "domain_auth=$DOMAIN_AUTH" >> $GITHUB_OUTPUT
          
          if [ "$DOMAIN_AUTH" != "True" ]; then
            echo "⚠️ domain_auth ist noch false!"
            echo "Bitte im MailerLite Dashboard:"
            echo "1. https://dashboard.mailerlite.com/account/domains"
            echo "2. Bei propus.ch auf 'Check DNS Records' klicken"
            echo ""
            echo "DNS-Record ist korrekt gesetzt:"
            dig litesrv._domainkey.propus.ch TXT +short
          fi

      - name: Register no-reply@propus.ch
        if: steps.check_auth.outputs.domain_auth == 'True'
        run: |
          echo "=== Registriere no-reply@propus.ch ==="
          RESULT=$(curl -s -X POST \
            "https://connect.mailerlite.com/api/domains" \
            -H "Authorization: Bearer ${{ inputs.mailerlite_token }}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            --data '{"email": "no-reply@propus.ch"}')
          echo "Ergebnis: $RESULT"

      - name: Register office@propus.ch
        if: steps.check_auth.outputs.domain_auth == 'True'
        run: |
          echo "=== Registriere office@propus.ch ==="
          RESULT=$(curl -s -X POST \
            "https://connect.mailerlite.com/api/domains" \
            -H "Authorization: Bearer ${{ inputs.mailerlite_token }}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            --data '{"email": "office@propus.ch"}')
          echo "Ergebnis: $RESULT"

      - name: Update automation welcome email (no-reply sender)
        if: steps.check_auth.outputs.domain_auth == 'True'
        run: |
          echo "=== Aktualisiere Automation E-Mail ==="
          RESULT=$(curl -s -X PUT \
            "https://connect.mailerlite.com/api/automations/185310240754894109/steps/185310241267648271" \
            -H "Authorization: Bearer ${{ inputs.mailerlite_token }}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            --data '{
              "data": {
                "name": "Willkommen E-Mail",
                "subject": "Willkommen bei Propus \u2013 Sch\u00f6n, dass Sie dabei sind!",
                "from": "no-reply@propus.ch",
                "from_name": "Propus",
                "reply_to": "office@propus.ch",
                "preheader": "Vielen Dank f\u00fcr Ihre Anmeldung \u2013 wir freuen uns auf Sie!"
              }
            }')
          
          SUCCESS=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print('error' not in d.get('message','') if 'message' in d else 'data' in d)" 2>/dev/null || echo "False")
          echo "Ergebnis: $RESULT"

      - name: Summary
        run: |
          if [ "${{ steps.check_auth.outputs.domain_auth }}" = "True" ]; then
            echo "✅ Setup abgeschlossen!"
            echo ""
            echo "Konfiguriert:"
            echo "  From:     no-reply@propus.ch"
            echo "  Reply-To: office@propus.ch"
            echo "  From-Name: Propus"
            echo ""
            echo "Nächste Schritte:"
            echo "  1. Automation HTML gestalten: https://dashboard.mailerlite.com/automations/185310240754894109"
            echo "  2. Automation oben rechts auf 'Activate' klicken"
          else
            echo "⏳ Warte auf domain_auth=true"
            echo ""
            echo "Einmalig nötig:"
            echo "  → https://dashboard.mailerlite.com/account/domains"
            echo "  → Bei propus.ch: 'Check DNS Records' klicken"
            echo ""
            echo "DNS-Status (sollte DKIM Key zeigen):"
            dig litesrv._domainkey.propus.ch TXT +short || echo "DNS noch nicht propagiert"
          fi
