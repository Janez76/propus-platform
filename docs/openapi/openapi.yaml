# Propus Platform — Unified OpenAPI 3.1 Spec
#
# Diese Datei enthält sowohl kuratierte Einträge (mit echten Schemas)
# als auch auto-generierte Stubs aus booking/server.js + tours/routes/*.js.
# Auto-Stubs sind an `summary: 'TODO: ...'` und `x-source-file` erkennbar.
#
# Stubs regenerieren: `node scripts/extract-routes.js`
# Manuelle Einträge bleiben beim Regen erhalten.

openapi: 3.1.0
info:
  title: Propus Booking API
  version: 1.0.0
  description: |
    Backend-API für das Buchungstool von Propus GmbH. Serviert sowohl die
    öffentliche Buchungsstrecke (`/api/booking*`) als auch die Admin-Oberfläche
    (`/api/admin/*`, `/auth/*`).

    **Hinweise:**
    - Die meisten Routen liegen hinter Cloudflare + Nginx; `req.ip` ist die
      echte Client-IP (Trust-Proxy aktiv).
    - Sicherheitskritische Routen sind per `express-rate-limit` geschützt
      (siehe `booking/rate-limiters.js`).
    - Auth: Admin-Sessions via `admin_session`-Cookie (HttpOnly) **oder**
      `Authorization: Bearer <token>`-Header.
  contact:
    name: Propus Platform Team
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: https://booking.propus.ch
    description: Produktion (Public Booking Frontend)
  - url: https://admin-booking.propus.ch
    description: Produktion (Admin Backend)
  - url: http://localhost:3100
    description: Lokale Entwicklung (Express direkt)
tags:
  - name: auth
    description: Login, Sessions, Admin-Authentifizierung
  - name: booking
    description: Öffentliche Buchungsstrecke + Bestätigung
  - name: bookkeeper
    description: >-
      Buchhaltungs-Pipeline (Block 4). Backend-Proxy zum
      propus-bookkeeper-Container auf der NAS, der Belege via KI-Cascade (Sonnet
      4.6 → Opus 4.7) extrahiert, Custom Fields in Paperless schreibt, und nach
      Approval in bexio pusht. Alle Routes erfordern Admin-Cookie.
  - name: next-assistant
  - name: next-chat
  - name: next-cockpit
  - name: next-core
  - name: next-cron
  - name: next-teams-oauth
  - name: system
    description: Health-Check, Build-Info, Feature-Flags
  - name: tours
    description: >-
      Tour-Manager Public- und Service-Endpunkte (Matterport-Viewer,
      Gallery-API, Cron).
  - name: tours-admin
    description: >-
      Admin-Oberfläche des Tour-Managers (`/api/tours/admin/*` und
      `/tour-manager/admin/*`). Erfordert Admin-Session.
  - name: tours-auth
    description: Login- und Session-Handling des Tour-Managers (`/tour-manager/*`).
  - name: tours-customer
    description: >-
      Kunden-Self-Service-Links (`/tour-manager/r/*`), adressiert per
      Signed-URL.
  - name: tours-portal
    description: >-
      Kunden-Portal-API (`/tour-manager/portal/*`). Erfordert Portal-Session
      (`requirePortalSession`).
  - name: tours-webhook
    description: Eingehende Webhooks (z. B. Payrexx-Zahlungsstatus).
security: []
paths:
  /api/admin/login:
    post:
      tags:
        - auth
      summary: Admin-Login
      description: |
        Klassischer Username/Passwort-Login gegen `core.admin_users`. Setzt
        ein `admin_session`-Cookie und liefert zusätzlich einen Bearer-Token
        zurück, den das Admin-Panel im LocalStorage hält.

        **Rate-Limit:** 5 Versuche / 15 min pro IP (`authLimiter`).
      operationId: adminLoginLegacy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  description: E-Mail oder Username
                  example: admin@propus.ch
                password:
                  type: string
                  format: password
                rememberMe:
                  type: boolean
                  default: false
                  description: Verlängert Session-Cookie auf 30 Tage
      responses:
        '200':
          description: Login erfolgreich
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccess'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Ungültige Zugangsdaten
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          description: Datenbank nicht konfiguriert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/login:
    post:
      tags:
        - auth
      summary: Unified Admin-Login
      description: |
        Neuere, vereinheitlichte Login-Route. Akzeptiert sowohl `email` als
        auch `username` als Login-ID. Wird vom Admin-Panel via Next.js-Proxy
        (`/api/auth/login` → `/auth/login`) angesprochen.

        Liefert dasselbe Response-Format wie `/api/admin/login`.

        **Rate-Limit:** 5 Versuche / 15 min pro IP (`authLimiter`, gleicher
        Bucket wie `/api/admin/login`).
      operationId: adminLoginUnified
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: Login-ID (entweder `email` oder `username` setzen)
                username:
                  type: string
                  description: Login-ID (entweder `email` oder `username` setzen)
                password:
                  type: string
                  format: password
                rememberMe:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Login erfolgreich
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccess'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Ungültige Zugangsdaten
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/booking:
    post:
      tags:
        - booking
      summary: Öffentliche Buchungsanfrage
      description: |
        Hauptendpunkt der öffentlichen Buchungsstrecke. Akzeptiert die
        komplette Buchungs-Payload (Termin, Fotograf, Adresse, Services,
        Kontakt) und legt eine `booking.orders`-Zeile an.

        Bei Erfolg wird eine Bestätigungs-E-Mail mit Token-Link verschickt
        (siehe `/api/booking/confirm/:token`).

        **Rate-Limit:** 10 Submits / 60 min pro IP (`bookingLimiter`,
        eigener Bucket — Schutz vor Spam und Mailkosten).

        **TODO:** Vollständiges Body-Schema (`schedule`, `billing`,
        `object`, `services`, `address`, `keyPickup`, ...) ergänzen.
        Aktuell `additionalProperties: true`, weil ein eigenes Doku-Ticket
        benötigt wird, um alle Felder + ihre Validierung zu erfassen.
      operationId: createBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              properties:
                schedule:
                  type: object
                  properties:
                    photographer:
                      type: object
                      properties:
                        key:
                          type: string
                          description: Fotograf-Key oder `"any"` für Smart-Assignment
                        name:
                          type: string
                    date:
                      type: string
                      format: date
                    time:
                      type: string
                      pattern: ^[0-9]{2}:[0-9]{2}$
                billing:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                  additionalProperties: true
                object:
                  type: object
                  additionalProperties: true
                services:
                  type: object
                  additionalProperties: true
                address:
                  type: object
                  additionalProperties: true
                keyPickup:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Buchung angelegt
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  orderNo:
                    type: string
                    description: Generierte Auftragsnummer
                  requestId:
                    type: string
                  warnings:
                    type: array
                    items:
                      type: string
                additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/booking/confirm/{token}:
    get:
      tags:
        - booking
      summary: Buchung per Token-Link bestätigen
      description: |
        Wird vom Bestätigungs-Link in der E-Mail aufgerufen. Setzt
        `orders.status = 'confirmed'` und legt anschliessend Kalender-
        Einträge (Fotograf + Office) an.

        **Idempotent:** Wiederholtes Aufrufen mit demselben Token gibt
        `{ ok: true, already: true }` zurück.

        **Rate-Limit:** 10 Versuche / 15 min pro IP (`confirmTokenLimiter`,
        eigener Bucket — verhindert dass Bots, die öffentliche Confirm-Links
        spammen, das Admin-Login-Budget aus derselben NAT-IP auffressen).
      operationId: confirmBooking
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
            minLength: 32
          description: Confirmation-Token aus der E-Mail
      responses:
        '200':
          description: Bestätigung erfolgreich (oder bereits bestätigt)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  already:
                    type: boolean
                    description: True wenn Status bereits `confirmed` war
                  status:
                    type: string
                  orderNo:
                    type: string
        '400':
          description: Ungültiges Token-Format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Token unbekannt oder bereits gelöscht
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '410':
          description: Token abgelaufen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          description: Service nicht verfügbar (DB nicht erreichbar)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/health:
    get:
      tags:
        - system
      summary: Health-Check + Feature-Flags
      description: |
        Liefert Build-ID, Uptime und aktive Feature-Flags. Wird vom
        Container-Healthcheck (`docker-compose.vps.yml`) und vom Smoke-Test
        in der CI verwendet.
      operationId: getHealth
      responses:
        '200':
          description: Service ist erreichbar
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - buildId
                  - uptimeSec
                  - dbEnabled
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
                  buildId:
                    type: string
                  hasPricingPreviewRoute:
                    type: boolean
                  features:
                    type: object
                    additionalProperties:
                      type: boolean
                  dbEnabled:
                    type: boolean
                    description: True wenn `DATABASE_URL` gesetzt ist
                  uptimeSec:
                    type: integer
                    minimum: 0
        '503':
          description: Service degraded (z. B. DB nicht erreichbar)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/admin/me/home:
    get:
      tags:
        - booking
      summary: Heim-Adresse des eingeloggten Mitarbeiters
      description: >-
        Liefert die in `photographer_settings.home_address` (+ optional Lat/Lng)
        hinterlegte Heim-Adresse des Fotografen. Wird vom Mobile-Orders-Tab fuer
        den Heimfahrt-Divider am Tagesende verwendet (Routing ab letztem Termin
        → home). Match via `LOWER(photographers.email) = LOWER(session.email)`.
        Fuer Admins ohne Mitarbeiter-Verknuepfung sind alle Felder `null`; UI
        faellt dann auf "Heimfahrt nicht verfuegbar".

        Siehe `docs/FLOWS_BOOKING.md` §20 Mobile Tagesplan & Live-Routing.
      operationId: getApiAdminMeHome
      security:
        - bearerAuth: []
        - sessionCookie: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - homeAddress
                  - homeLat
                  - homeLng
                properties:
                  ok:
                    type: boolean
                  homeAddress:
                    type:
                      - string
                      - 'null'
                    description: >-
                      Volltext-Adresse (z.B. "Bahnhofstrasse 12, 8038 Zürich")
                      oder null.
                    example: 8038 Zürich
                  homeLat:
                    type:
                      - number
                      - 'null'
                    format: float
                    description: Breitengrad — falls geocodiert. null sonst.
                  homeLng:
                    type:
                      - number
                      - 'null'
                    format: float
                    description: Längengrad — falls geocodiert. null sonst.
        '401':
          $ref: '#/components/responses/Unauthorized'
        5XX:
          $ref: '#/components/responses/ServerError'
  /api/dashboard/drive-times:
    post:
      tags:
        - booking
      summary: Live-Fahrzeiten von einer GPS-Position zu mehreren Zieladressen
      description: >-
        **Manueller Eintrag** — Next.js-Route in
        `app/src/app/api/dashboard/drive-times/route.ts`, wird vom Auto-Scanner
        (`extract-routes.js`) nicht erfasst.

        Liefert Live-Verkehrs-Fahrzeiten von einer Origin-Koordinate zu bis zu
        25 Ziel-Adressen via Google Distance Matrix API. Pro Element ~$0.005 →
        Rate-Limits aus Bug-Hunt M01:

        **Rate-Limit:** 30 Anfragen/Minute pro Session, 1000/Tag (konfigurierbar
        via `DRIVE_TIMES_PER_MIN_LIMIT`/`DRIVE_TIMES_PER_DAY_LIMIT`). Ausnahmen:
        `ASSISTANT_UNLIMITED_EMAILS`-Liste.

        Genutzt von: `dashboard-v2/TodayCard` und `MobileOrdersTab`
        (Mobile-Phase 2 Live-Routing).

        Siehe `docs/FLOWS_BOOKING.md` §20 Mobile Tagesplan & Live-Routing.
      operationId: postApiDashboardDriveTimes
      security:
        - bearerAuth: []
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - lat
                - lng
                - legs
              properties:
                lat:
                  type: number
                  format: float
                  minimum: -90
                  maximum: 90
                  description: Origin-Breitengrad (z.B. aus useGeolocation).
                lng:
                  type: number
                  format: float
                  minimum: -180
                  maximum: 180
                  description: Origin-Längengrad.
                legs:
                  type: array
                  description: Bis zu 25 Ziele (MAX_LEGS); weitere werden ignoriert.
                  maxItems: 25
                  items:
                    type: object
                    required:
                      - orderNo
                      - address
                    properties:
                      orderNo:
                        type: string
                      address:
                        type: string
                        minLength: 3
      responses:
        '200':
          description: OK — pro Leg ein Eintrag mit Fahrzeit + Distanz aus Google Maps.
          content:
            application/json:
              schema:
                type: object
                required:
                  - legs
                properties:
                  legs:
                    type: array
                    items:
                      type: object
                      properties:
                        orderNo:
                          type: string
                        durationText:
                          type:
                            - string
                            - 'null'
                          description: >-
                            z.B. "12 mins" oder "1 hour 5 mins" —
                            Google-Maps-Format mit Live-Verkehr.
                          example: 32 mins
                        distanceText:
                          type:
                            - string
                            - 'null'
                          example: 8.4 km
                        status:
                          type: string
                          description: OK / ZERO_RESULTS / NOT_FOUND / etc.
                          example: OK
        '400':
          description: >-
            Ungültiges JSON, lat/lng ausserhalb Range, leere legs,
            Maps-Provider-Fehler.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Portal-only Rolle ohne Impersonation.
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          description: GOOGLE_MAPS-Konfiguration fehlt oder Provider nicht erreichbar.
        5XX:
          $ref: '#/components/responses/ServerError'
  /api/admin/bookkeeper/counts:
    get:
      tags:
        - bookkeeper
      summary: Status-Counts der Buchhaltungs-Pipeline
      description: >-
        Live-Counts aller Belege pro Pipeline-Stage (pending, vorgeschlagen,
        approved, verbucht, fehler, spam, abgleich, duplikat). Quelle:
        Paperless-NGX via Backend-Proxy. 503 wenn Token nicht konfiguriert.
      responses:
        '200':
          description: Counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  configured:
                    type: boolean
                  counts:
                    type: object
                    additionalProperties:
                      type: integer
        '503':
          $ref: '#/components/responses/ServerError'
  /api/admin/bookkeeper/documents:
    get:
      tags:
        - bookkeeper
      summary: Liste der Belege eines Status
      parameters:
        - name: status
          in: query
          required: true
          schema:
            type: string
            enum:
              - pending
              - vorgeschlagen
              - approved
              - verbucht
              - fehler
              - spam
              - abgleich
              - duplikat
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: min_confidence
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 100
        - name: max_confidence
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 100
      responses:
        '200':
          description: Document list mit Custom Fields
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  total:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        title:
                          type: string
                        added:
                          type: string
                          format: date-time
                        tags:
                          type: array
                          items:
                            type: integer
                        custom_fields:
                          type: object
                          additionalProperties: true
  /api/admin/bookkeeper/documents/{id}:
    get:
      tags:
        - bookkeeper
      summary: Detail eines Belegs (Paperless-Passthrough)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Doc Detail
    patch:
      tags:
        - bookkeeper
      summary: Inline-Edit der Custom Fields (mit Merge-Logic)
      description: >-
        Wichtig: Paperless `PATCH custom_fields=[...]` ist ein REPLACE der
        gesamten Liste. Der Backend-Proxy merged automatisch mit existierenden
        Feldern, sodass nur die übergebenen Felder geändert werden.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fields
              properties:
                fields:
                  type: object
                  description: '{ "<paperless_field_id>": <value>, ... }'
                  additionalProperties: true
      responses:
        '200':
          description: ok
    delete:
      tags:
        - bookkeeper
      summary: Beleg in Paperless-Trash + optional bexio-Storno
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: also_bexio
          in: query
          schema:
            type: boolean
            default: false
          description: 'Wenn true: auch zugehörige bexio-Buchung stornieren'
      responses:
        '200':
          description: Result inkl. Paperless- und bexio-Status
  /api/admin/bookkeeper/documents/{id}/approve:
    post:
      tags:
        - bookkeeper
      summary: Tag-Swap vorgeschlagen → approved
      description: >-
        Container pollt approved-Belege und pusht sie nach bexio (sofern
        BOOKKEEPER_DRY_RUN=false).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: ok
  /api/admin/bookkeeper/documents/{id}/reject:
    post:
      tags:
        - bookkeeper
      summary: Beleg auf pending zurück (Re-Cascade)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: ok
  /api/admin/bookkeeper/documents/{id}/spam:
    post:
      tags:
        - bookkeeper
      summary: Beleg als spam markieren
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: ok
  /api/admin/bookkeeper/preflight/{id}:
    get:
      tags:
        - bookkeeper
      summary: Pre-Flight-Check vor bexio-Push
      description: Prüft Pflichtfelder + Existenz der Soll/Haben-Konten in bexio.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Pre-Flight-Result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  doc_id:
                    type: integer
                  issues:
                    type: array
                    items:
                      type: object
                      properties:
                        severity:
                          type: string
                          enum:
                            - error
                            - warn
                        field:
                          type: string
                        msg:
                          type: string
  /api/admin/bookkeeper/feedback:
    post:
      tags:
        - bookkeeper
      summary: User-Korrektur loggen (KI-Training-Sample)
      description: >-
        Persistiert in `core.bookkeeper_feedback` und patcht das Custom Field in
        Paperless live. Der `generate_few_shot.py`-Generator liest unapplied
        Einträge und webt sie in `prompts/extractor.txt` ein.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - doc_id
                - field_id
              properties:
                doc_id:
                  type: integer
                field_id:
                  type: integer
                  description: Paperless-Custom-Field-ID (2..18)
                original_value:
                  type: string
                corrected_value:
                  type: string
                reason:
                  type: string
      responses:
        '200':
          description: ok
    get:
      tags:
        - bookkeeper
      summary: Feedback-Liste (Audit + Training-View)
      parameters:
        - name: unapplied
          in: query
          schema:
            type: string
            enum:
              - '1'
      responses:
        '200':
          description: Feedback-Rows
  /api/admin/bookkeeper/recascade:
    post:
      tags:
        - bookkeeper
      summary: Bulk-Re-Cascade aller Belege eines Status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum:
                    - vorgeschlagen
                    - approved
                    - fehler
                    - spam
                    - abgleich
                    - duplikat
      responses:
        '200':
          description: migrated count
  /auth/logout:
    get:
      tags:
        - booking
      summary: 'TODO: GET /auth/logout'
      description: >-
        **Auto-generierter Stub.** Quelle: `booking/server.js:2659`. Schemas
        noch nicht dokumentiert.
      operationId: getAuthLogout
      x-source-file: booking/server.js
      x-source-line: 2659
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        5XX:
          $ref: '#/components/responses/ServerError'
  /auth/profile:
    get:
      tags:
        - booking
      summary: 'TODO: GET /auth/profile'
      description: >-
        **Auto-generierter Stub.** Quelle: `booking/server.js:2783`. Schemas
        noch nicht dokumentiert.
      operationId: getAuthProfile
      x-source-file: booking/server.js
      x-source-line: 2783
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
