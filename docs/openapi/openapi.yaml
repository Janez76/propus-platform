components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: Admin-Token aus Login-Response (LocalStorage)
    sessionCookie:
      type: apiKey
      in: cookie
      name: admin_session
      description: HttpOnly-Session-Cookie, vom Login-Endpunkt gesetzt
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: Shared-Secret für Cron-/Server-zu-Server-Integrationen (requireApiKey).
  schemas:
    LoginSuccess:
      type: object
      required:
        - ok
        - token
        - role
        - permissions
      properties:
        ok:
          type: boolean
          enum:
            - true
        token:
          type: string
          description: Bearer-Token, identisch mit `admin_session`-Cookie
        role:
          type: string
          example: admin
        permissions:
          type: array
          items:
            type: string
          description: Aufgelöste RBAC-Permissions (siehe ROLES_PERMISSIONS.md)
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        ok:
          type: boolean
          enum:
            - false
  responses:
    BadRequest:
      description: Eingabe ungültig
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate-Limit überschritten (siehe `booking/rate-limiters.js`)
      headers:
        RateLimit-Limit:
          schema:
            type: integer
        RateLimit-Remaining:
          schema:
            type: integer
        RateLimit-Reset:
          schema:
            type: integer
            description: Sekunden bis Reset
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServerError:
      description: Interner Fehler
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Auth erforderlich oder ungültig
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
